# manifest.toml — Single source of truth for all installed packages,
# tools, symlinks, and resources.
#
# Consumed by: install.sh, install-asdf-plugins.sh, test.sh, tests/*.sh
# Parsed via:  helpers/read-manifest.py (Python 3.11+ tomllib)

[packages.linux]
# Installed via: sudo apt install
list = [
  "autoconf",
  "bison",
  "build-essential",
  "curl",
  "gawk",
  "gcc",
  "git",
  "jp2a",
  "libevent-dev",
  "libfontconfig1-dev",
  "libfreetype-dev",
  "libncurses-dev",
  "make",
  "pkg-config",
  "xsel",
]

[packages.darwin]
# Installed via: brew install
list = [
  "autoconf",
  "curl",
  "fontconfig",
  "freetype",
  "gawk",
  "gcc",
  "git",
  "jp2a",
  "libevent",
  "make",
  "ncurses",
  "pkg-config",
  "utf8proc",
]

[packages.linux_brew]
# Installed via: brew install (Linux, no-sudo path)
# gawk builds from source (non-standard prefix); requires LC_ALL=en_US.UTF-8
# for make check to pass. See Dockerfile.no-sudo for the locale setup.
# zsh is managed via brew.tools (installed before ncurses to avoid build conflict).
list = [
  "autoconf",
  "bison",
  "curl",
  "fontconfig",
  "freetype",
  "gawk",
  "gcc",
  "git",
  "jp2a",
  "libevent",
  "make",
  "ncurses",
  "pkg-config",
]

[cargo]
# Placeholder — add entries here for any future cargo tools.
# Rust/cargo is always installed; this list drives cargo install runs.
tools = []

[[brew.tools]]
formula = "bat"

[[brew.tools]]
formula = "dust"

[[brew.tools]]
formula = "eza"

[[brew.tools]]
formula = "fd"

[[brew.tools]]
formula = "procs"

[[brew.tools]]
formula = "ripgrep"
binary = "rg"

[[brew.tools]]
formula = "starship"

[[brew.tools]]
formula = "viu"

[[brew.tools]]
formula = "zoxide"

[[brew.tools]]
formula = "python@3.14"
binary = "python3"
flags = "--force-bottle"

[[brew.tools]]
formula = "zsh"

[[resources]]
name = "tpm"
type = "git-clone"
path = "~/.tmux/plugins/tpm"
url = "https://github.com/tmux-plugins/tpm"
branch = "master"

[[resources]]
name = "nerd-fonts"
type = "git-clone"
path = ".git_downloads/nerd-fonts"
url = "https://github.com/ryanoasis/nerd-fonts"
branch = "master"
shallow = true
post_install = "./install.sh"

[[resources]]
name = "mate"
type = "git-clone"
path = ".git_downloads/mate"
url = "https://github.com/jeffujioka/mate"
branch = "main"
shallow = true
post_install = "./install.sh"

[[symlinks]]
source = "zshrc"
target = "~/.zshrc"

[[symlinks]]
source = "zsh_aliases"
target = "~/.zsh_aliases"

[[symlinks]]
source = "zsh_completions"
target = "~/.zsh_completions"

[[symlinks]]
source = "zsh_aliases.d"
target = "~/.zsh_aliases.d"

[[symlinks]]
source = "zsh_completion.d"
target = "~/.zsh_completion.d"
backup = false

[[symlinks]]
source = "config/starship/config.toml"
target = "~/.config/starship/config.toml"

[[symlinks]]
source = "config/fzf.zsh"
target = "~/.config/fzf/fzf.zsh"

[[symlinks]]
source = "config/ascii-art-goku.txt"
target = "~/.config/ascii-art-goku.txt"
backup = false

[[symlinks]]
source = "gitignore"
target = "~/.gitignore"

[[symlinks]]
source = "tmux.conf"
target = "~/.tmux.conf"

[[symlinks]]
source = "vimrc"
target = "~/.vimrc"

[[symlinks]]
source = "gitconfig"
target = "~/.gitconfig"
type = "copy"

[[symlinks]]
source = "bin/*"
target = "~/.local/bin/*"
type = "glob"
