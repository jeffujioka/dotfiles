# ~/.config/starship.toml ÔÇö powerline ┬À Twilight palette  ┬À glow ┬À medium contrast
# Evening sky: lavender ÔåÆ violet ÔåÆ indigo ÔåÆ midnight
# Swap: starship-picker

add_newline = true
command_timeout = 1000

format = """
[¯éÂ](#2c1850)\
$os\
$username\
$hostname\
[¯é░](bg:#221248 fg:#2c1850)\
$directory\
[¯é░](fg:#221248 bg:#1a0e40)\
${custom.giticon}\
$git_branch\
$git_status\
[¯é░](fg:#1a0e40 bg:#100a2e)\
${custom.tmux_zoom}\
$python\
$nodejs\
$rust\
$java\
$c\
${custom.cpp}\
${custom.vpn}\
$docker_context\
[¯é░](fg:#100a2e)\
$fill\
[¯é▓](fg:#0c081e)\
$cmd_duration\
$battery\
$time\
[¯é┤](fg:#0c081e)\
\n$character"""

continuation_prompt = '[¯é░¯é░](#7020ff) '

[fill]
symbol = 'ÔöÇ'
style = '#080614'

[character]
success_symbol = '[ÔØ»](bold #a070ff)'
error_symbol = '[ÔØ»](bold #ff4444)'

[os]
style = 'fg:#eeccff bg:#2c1850'
format = '[ $symbol ]($style)'
disabled = false

[os.symbols]
Macos = '¾░ÇÁ'
Ubuntu = "¯»ë"
Linux = "¯»å"

[username]
style_user = 'fg:#eeccff bg:#2c1850'
style_root = 'fg:#eeccff bg:#2c1850'
format = '[ $user]($style)'
disabled = false
show_always = false

[hostname]
ssh_only = true
style = 'fg:#eeccff bg:#2c1850'
format = '[@$hostname ]($style)'
disabled = false

[directory]
style = 'fg:#cc99ff bg:#221248'
format = '[ $path ]($style)'
truncation_length = 4
truncation_symbol = 'ÔÇª/'
fish_style_pwd_dir_length = 2
home_symbol = '¾░ï£ ~'
read_only = ' ¾░î¥ '
read_only_style = 'fg:#cc99ff bg:#221248'

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = " "
style = 'bg:#1a0e40'
format = '[ $symbol$branch ](fg:#9977ff bg:#1a0e40)'
truncation_symbol = 'ÔÇª/'

[git_status]
style = 'bg:#1a0e40'
format = '[$all_status$ahead_behind ](fg:#9977ff bg:#1a0e40)'
up_to_date = ''
ahead = 'Ôçí${count}'
diverged = 'ÔçòÔçí${ahead_count}Ôçú${behind_count}'
behind = 'Ôçú${count}'
staged = '+${count} '
modified = '~${count} '
untracked = '?${count} '
deleted = '-${count} '
conflicted = '!${count} '
stashed = '\$${count} '

[python]
symbol = " "
style = 'fg:#7766dd bg:#100a2e'
format = '[ $symbol($version )(\($virtualenv\) )]($style)'
pyenv_version_name = true

[nodejs]
symbol = " "
style = 'fg:#7766dd bg:#100a2e'
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = " "
style = 'fg:#7766dd bg:#100a2e'
format = '[ $symbol ($version) ]($style)'

[java]
symbol = " "
style = 'fg:#7766dd bg:#100a2e'
format = '[ $symbol ($version) ]($style)'

[c]
symbol = " "
style = 'fg:#7766dd bg:#100a2e'
format = '[ $symbol ($version) ]($style)'
detect_extensions = ['.c']

[docker_context]
symbol = " "
style = 'fg:#7766dd bg:#100a2e'
format = '[ $symbol $context ]($style)'

[cmd_duration]
min_time = 2000
style = 'fg:#6655bb bg:#0c081e'
format = '[ ÔÅ▒ $duration ]($style)'

[time]
disabled = false
time_format = "%d/%m/%y %H:%M"
style = 'fg:#6655bb bg:#0c081e'
format = '[ ¾▒æì $time ]($style)'

[battery]
disabled = false
full_symbol = '¾▒èú'
charging_symbol = '¾▒èª'
discharging_symbol = '¾▒èú'
format = '[ $symbol$percentage ]($style)'

[[battery.display]]
threshold = 100
style = 'fg:#6655bb bg:#0c081e'

[[battery.display]]
threshold = 50
charging_symbol = '¾▒èÑ'
discharging_symbol = '¾▒èó'
style = 'fg:#6655bb bg:#0c081e'

[[battery.display]]
threshold = 20
charging_symbol = '¾▒èñ'
discharging_symbol = '¾▒èí'
style = 'fg:#6655bb bg:#0c081e'

[[battery.display]]
threshold = 10
charging_symbol = '¾░¿£'
discharging_symbol = '¾┤âì'
style = 'bg:#c0392b'

[custom.giticon]
disabled = false
description = "Display symbol for remote Git server"
command = "check-git-remote.sh"
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
shell = ["bash", "--noprofile", "--norc"]
style = 'bg:#1a0e40'
format = '[ $output ](fg:#9977ff bg:#1a0e40)'

[custom.cpp]
description = "custom C++ config"
command = 'echo '
detect_extensions = ['.h', '.hpp', 'cpp', '.cc']
style = 'fg:#7766dd bg:#100a2e'
format = '[ $output ]($style)'
when = true

[custom.vpn]
disabled = false
command = 'echo  ¾░ôä'
style = 'fg:#7766dd bg:#100a2e'
format = '[ $output ]($style)'
when = 'ip route show | grep zcctun | awk "{ print $1 }" | grep "^53\." || daimler-vpn -s | grep -w "Connection Established"'

[custom.tmux_zoom]
disabled = false
description = "Show indicator when tmux pane is zoomed"
command = 'echo "¾░ûù zoom"'
style = 'fg:#7766dd bg:#100a2e'
when = '[ -n "$TMUX" ] && [ "$(tmux display-message -p "#{window_zoomed_flag}")" = "1" ]'
format = '[ $output ]($style)'
shell = ["bash", "--noprofile", "--norc"]
