# ~/.config/starship.toml вҖ” powerline В· Forest palette  В· deep В· dark hue-shift
# Woodland: canopy вҶ’ moss вҶ’ earth
# Swap: starship-picker

add_newline = true
command_timeout = 1000

format = """
[оӮ¶](#081e0c)\
$os\
$username\
$hostname\
[оӮ°](bg:#061810 fg:#081e0c)\
$directory\
[оӮ°](fg:#061810 bg:#081408)\
${custom.giticon}\
$git_branch\
$git_status\
[оӮ°](fg:#081408 bg:#141006)\
${custom.tmux_zoom}\
$python\
$nodejs\
$rust\
$java\
$c\
${custom.cpp}\
${custom.vpn}\
$docker_context\
[оӮ°](fg:#141006)\
$fill\
[оӮІ](fg:#100e08)\
$cmd_duration\
$battery\
$time\
[оӮҙ](fg:#100e08)\
\n$character"""

continuation_prompt = '[оӮ°оӮ°](#10c050) '

[fill]
symbol = 'в”Җ'
style = '#080c06'

[character]
success_symbol = '[вқҜ](bold #50c868)'
error_symbol = '[вқҜ](bold #ff4444)'

[os]
style = 'fg:#77dd77 bg:#081e0c'
format = '[ $symbol ]($style)'
disabled = false

[os.symbols]
Macos = 'у°Җө'
Ubuntu = "оҜү"
Linux = "оҜҶ"

[username]
style_user = 'fg:#77dd77 bg:#081e0c'
style_root = 'fg:#77dd77 bg:#081e0c'
format = '[ $user]($style)'
disabled = false
show_always = false

[hostname]
ssh_only = true
style = 'fg:#77dd77 bg:#081e0c'
format = '[@$hostname ]($style)'
disabled = false

[directory]
style = 'fg:#44bb66 bg:#061810'
format = '[ $path ]($style)'
truncation_length = 4
truncation_symbol = 'вҖҰ/'
fish_style_pwd_dir_length = 2
home_symbol = 'у°Ӣң ~'
read_only = ' у°Ңҫ '
read_only_style = 'fg:#44bb66 bg:#061810'

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = " "
style = 'bg:#081408'
format = '[ $symbol$branch ](fg:#77cc44 bg:#081408)'
truncation_symbol = 'вҖҰ/'

[git_status]
style = 'bg:#081408'
format = '[$all_status$ahead_behind ](fg:#77cc44 bg:#081408)'
up_to_date = ''
ahead = 'вҮЎ${count}'
diverged = 'вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}'
behind = 'вҮЈ${count}'
staged = '+${count} '
modified = '~${count} '
untracked = '?${count} '
deleted = '-${count} '
conflicted = '!${count} '
stashed = '\$${count} '

[python]
symbol = " "
style = 'fg:#ccbb33 bg:#141006'
format = '[ $symbol($version )(\($virtualenv\) )]($style)'
pyenv_version_name = true

[nodejs]
symbol = " "
style = 'fg:#ccbb33 bg:#141006'
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = " "
style = 'fg:#ccbb33 bg:#141006'
format = '[ $symbol ($version) ]($style)'

[java]
symbol = " "
style = 'fg:#ccbb33 bg:#141006'
format = '[ $symbol ($version) ]($style)'

[c]
symbol = " "
style = 'fg:#ccbb33 bg:#141006'
format = '[ $symbol ($version) ]($style)'
detect_extensions = ['.c']

[docker_context]
symbol = " "
style = 'fg:#ccbb33 bg:#141006'
format = '[ $symbol $context ]($style)'

[cmd_duration]
min_time = 2000
style = 'fg:#aaa022 bg:#100e08'
format = '[ вҸұ $duration ]($style)'

[time]
disabled = false
time_format = "%d/%m/%y %H:%M"
style = 'fg:#aaa022 bg:#100e08'
format = '[ уұ‘Қ $time ]($style)'

[battery]
disabled = false
full_symbol = 'уұҠЈ'
charging_symbol = 'уұҠҰ'
discharging_symbol = 'уұҠЈ'
format = '[ $symbol$percentage ]($style)'

[[battery.display]]
threshold = 100
style = 'fg:#aaa022 bg:#100e08'

[[battery.display]]
threshold = 50
charging_symbol = 'уұҠҘ'
discharging_symbol = 'уұҠў'
style = 'fg:#aaa022 bg:#100e08'

[[battery.display]]
threshold = 20
charging_symbol = 'уұҠӨ'
discharging_symbol = 'уұҠЎ'
style = 'fg:#aaa022 bg:#100e08'

[[battery.display]]
threshold = 10
charging_symbol = 'у°Ёң'
discharging_symbol = 'уҙғҚ'
style = 'bg:#c0392b'

[custom.giticon]
disabled = false
description = "Display symbol for remote Git server"
command = "check-git-remote.sh"
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
shell = ["bash", "--noprofile", "--norc"]
style = 'bg:#081408'
format = '[ $output ](fg:#77cc44 bg:#081408)'

[custom.cpp]
description = "custom C++ config"
command = 'echo '
detect_extensions = ['.h', '.hpp', 'cpp', '.cc']
style = 'fg:#ccbb33 bg:#141006'
format = '[ $output ]($style)'
when = true

[custom.vpn]
disabled = false
command = 'echo  у°“„'
style = 'fg:#ccbb33 bg:#141006'
format = '[ $output ]($style)'
when = 'ip route show | grep zcctun | awk "{ print $1 }" | grep "^53\." || daimler-vpn -s | grep -w "Connection Established"'

[custom.tmux_zoom]
disabled = false
description = "Show indicator when tmux pane is zoomed"
command = 'echo "у°–— zoom"'
style = 'fg:#ccbb33 bg:#141006'
when = '[ -n "$TMUX" ] && [ "$(tmux display-message -p "#{window_zoomed_flag}")" = "1" ]'
format = '[ $output ]($style)'
shell = ["bash", "--noprofile", "--norc"]
