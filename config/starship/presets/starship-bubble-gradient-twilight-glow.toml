# ~/.config/starship.toml вҖ” bubble В· Twilight palette  В· glow В· medium contrast
# Evening sky: lavender вҶ’ violet вҶ’ indigo вҶ’ midnight
# Swap: starship-picker

add_newline = true
command_timeout = 1000

format = """
[оӮ¶](fg:#9050f0)[ $os ](fg:#0a0a0a bg:#9050f0)[оӮҙ](fg:#9050f0) \
[оӮ¶](fg:#2c1850)$username\
$hostname\
$directory\
[оӮҙ](fg:#2c1850) \
${custom.git_start}\
${custom.giticon}\
$git_branch\
$git_status\
${custom.git_end}\
${custom.tmux_zoom}\
$python\
$nodejs\
$rust\
$java\
$c\
${custom.cpp}\
${custom.vpn}\
$docker_context\
$fill\
[оӮ¶](fg:#0c081e)$cmd_duration\
$battery\
$time\
[оӮҙ](fg:#0c081e)\
\n$character"""

continuation_prompt = '[оӮ°оӮ°](#9050f0) '

[fill]
symbol = 'в”Җ'
style = '#0c081e'

[character]
success_symbol = '[вқҜ](bold #a070ff)'
error_symbol = '[вқҜ](bold #ff4444)'

[os]
style = 'bg:#9050f0'
format = '$symbol'
disabled = false

[os.symbols]
Macos = 'у°Җө'
Ubuntu = "оҜү"
Linux = "оҜҶ"

[username]
style_user = 'fg:#eeccff'
style_root = 'bold fg:#ff4444'
format = '[[ $user ](fg:#eeccff bg:#2c1850)]($style)'
disabled = false
show_always = false

[hostname]
ssh_only = true
style = 'bg:#2c1850'
format = '[[@$hostname ](fg:#eeccff bg:#2c1850)]($style)'
disabled = false

[directory]
style = 'bg:#2c1850'
format = '[[ $path ](fg:#eeccff bg:#2c1850)]($style)'
truncation_length = 4
truncation_symbol = 'вҖҰ/'
fish_style_pwd_dir_length = 2
home_symbol = 'у°Ӣң ~'
read_only = ' у°Ңҫ'
read_only_style = 'fg:#eeccff bg:#2c1850'

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = " "
style = 'bg:#1a0e40'
format = '[[ $symbol$branch ](fg:#9977ff bg:#1a0e40)]($style)'
truncation_symbol = 'вҖҰ/'

[git_status]
style = 'bg:#1a0e40'
format = '[[($all_status$ahead_behind )](fg:#9977ff bg:#1a0e40)]($style)'
up_to_date = ''
ahead = 'вҮЎ${count}'
diverged = 'вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}'
behind = 'вҮЈ${count}'
staged = '+${count} '
modified = '~${count} '
untracked = '?${count} '
deleted = '-${count} '
conflicted = '!${count} '
stashed = '\$${count} '

[python]
symbol = " "
style = 'bg:#100a2e'
format = '[оӮ¶](fg:#100a2e)[ $symbol($version )(\($virtualenv\) ) ](fg:#7766dd bg:#100a2e)[оӮҙ](fg:#100a2e) '
pyenv_version_name = true

[nodejs]
symbol = " "
style = 'bg:#100a2e'
format = '[оӮ¶](fg:#100a2e)[ $symbol ($version) ](fg:#7766dd bg:#100a2e)[оӮҙ](fg:#100a2e) '

[rust]
symbol = " "
style = 'bg:#100a2e'
format = '[оӮ¶](fg:#100a2e)[ $symbol ($version) ](fg:#7766dd bg:#100a2e)[оӮҙ](fg:#100a2e) '

[java]
symbol = " "
style = 'bg:#100a2e'
format = '[оӮ¶](fg:#100a2e)[ $symbol ($version) ](fg:#7766dd bg:#100a2e)[оӮҙ](fg:#100a2e) '

[c]
symbol = " "
style = 'bg:#100a2e'
format = '[оӮ¶](fg:#100a2e)[ $symbol ($version) ](fg:#7766dd bg:#100a2e)[оӮҙ](fg:#100a2e) '
detect_extensions = ['.c']

[docker_context]
symbol = " "
style = 'bg:#100a2e'
format = '[оӮ¶](fg:#100a2e)[ $symbol $context ](fg:#7766dd bg:#100a2e)[оӮҙ](fg:#100a2e) '

[cmd_duration]
min_time = 2000
style = 'bg:#0c081e'
format = '[[ вҸұ $duration ](fg:#6655bb bg:#0c081e)]($style)'

[time]
disabled = false
time_format = "%d/%m/%y %H:%M"
style = 'bg:#0c081e'
format = '[[  $time ](fg:#6655bb bg:#0c081e)]($style)'

[battery]
disabled = false
full_symbol = 'уұҠЈ'
charging_symbol = 'уұҠҰ'
discharging_symbol = 'уұҠЈ'
format = '[[ $symbol$percentage ](fg:#6655bb bg:#0c081e)]($style)'

[[battery.display]]
threshold = 100
style = 'bg:#0c081e'

[[battery.display]]
threshold = 50
charging_symbol = 'уұҠҘ'
discharging_symbol = 'уұҠў'
style = 'bg:#0c081e'

[[battery.display]]
threshold = 20
charging_symbol = 'уұҠӨ'
discharging_symbol = 'уұҠЎ'
style = 'bg:#0c081e'

[[battery.display]]
threshold = 10
charging_symbol = 'у°Ёң'
discharging_symbol = 'уҙғҚ'
style = 'bg:#c0392b'

[custom.git_start]
disabled = false
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
command = 'echo ""'
shell = ["bash", "--noprofile", "--norc"]
format = '[оӮ¶](fg:#1a0e40)'

[custom.git_end]
disabled = false
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
command = 'echo ""'
shell = ["bash", "--noprofile", "--norc"]
format = '[оӮҙ](fg:#1a0e40) '

[custom.giticon]
disabled = false
description = "Display symbol for remote Git server"
command = "check-git-remote.sh"
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
shell = ["bash", "--noprofile", "--norc"]
style = 'bg:#1a0e40'
format = '[[ $output ](fg:#9977ff bg:#1a0e40)]($style)'

[custom.cpp]
description = "custom C++ config"
command = 'echo '
detect_extensions = ['.h', '.hpp', 'cpp', '.cc']
style = 'bg:#100a2e'
format = '[оӮ¶](fg:#100a2e)[ $output ](fg:#7766dd bg:#100a2e)[оӮҙ](fg:#100a2e) '
when = true

[custom.vpn]
disabled = false
command = 'echo  у°“„'
style = 'bg:#100a2e'
format = '[оӮ¶](fg:#100a2e)[ $output ](fg:#7766dd bg:#100a2e)[оӮҙ](fg:#100a2e) '
when = 'ip route show | grep zcctun | awk "{ print $1 }" | grep "^53\." || daimler-vpn -s | grep -w "Connection Established"'

[custom.tmux_zoom]
disabled = false
description = "Show indicator when tmux pane is zoomed"
command = 'echo "у°–— zoom"'
style = 'bg:#100a2e'
when = '[ -n "$TMUX" ] && [ "$(tmux display-message -p "#{window_zoomed_flag}")" = "1" ]'
format = '[оӮ¶](fg:#100a2e)[ $output ](fg:#7766dd bg:#100a2e)[оӮҙ](fg:#100a2e) '
shell = ["bash", "--noprofile", "--norc"]
