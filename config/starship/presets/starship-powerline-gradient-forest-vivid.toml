# ~/.config/starship.toml вҖ” powerline В· Forest palette  В· vivid В· high contrast
# Woodland: canopy вҶ’ moss вҶ’ earth
# Swap: starship-picker

add_newline = true
command_timeout = 1000

format = """
[оӮ¶](#1a5c22)\
$os\
$username\
$hostname\
[оӮ°](bg:#185020 fg:#1a5c22)\
$directory\
[оӮ°](fg:#185020 bg:#1e4418)\
${custom.giticon}\
$git_branch\
$git_status\
[оӮ°](fg:#1e4418 bg:#363008)\
${custom.tmux_zoom}\
$python\
$nodejs\
$rust\
$java\
$c\
${custom.cpp}\
${custom.vpn}\
$docker_context\
[оӮ°](fg:#363008)\
$fill\
[оӮІ](fg:#282200)\
$cmd_duration\
$battery\
$time\
[оӮҙ](fg:#282200)\
\n$character"""

continuation_prompt = '[оӮ°оӮ°](#10c050) '

[fill]
symbol = 'в”Җ'
style = '#181500'

[character]
success_symbol = '[вқҜ](bold #50c868)'
error_symbol = '[вқҜ](bold #ff4444)'

[os]
style = 'fg:#aaff99 bg:#1a5c22'
format = '[ $symbol ]($style)'
disabled = false

[os.symbols]
Macos = 'у°Җө'
Ubuntu = "оҜү"
Linux = "оҜҶ"

[username]
style_user = 'fg:#aaff99 bg:#1a5c22'
style_root = 'fg:#aaff99 bg:#1a5c22'
format = '[ $user]($style)'
disabled = false
show_always = false

[hostname]
ssh_only = true
style = 'fg:#aaff99 bg:#1a5c22'
format = '[@$hostname ]($style)'
disabled = false

[directory]
style = 'fg:#66ee88 bg:#185020'
format = '[ $path ]($style)'
truncation_length = 4
truncation_symbol = 'вҖҰ/'
fish_style_pwd_dir_length = 2
home_symbol = 'у°Ӣң ~'
read_only = ' у°Ңҫ '
read_only_style = 'fg:#66ee88 bg:#185020'

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = " "
style = 'bg:#1e4418'
format = '[ $symbol$branch ](fg:#aaee55 bg:#1e4418)'
truncation_symbol = 'вҖҰ/'

[git_status]
style = 'bg:#1e4418'
format = '[$all_status$ahead_behind ](fg:#aaee55 bg:#1e4418)'
up_to_date = ''
ahead = 'вҮЎ${count}'
diverged = 'вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}'
behind = 'вҮЈ${count}'
staged = '+${count} '
modified = '~${count} '
untracked = '?${count} '
deleted = '-${count} '
conflicted = '!${count} '
stashed = '\$${count} '

[python]
symbol = " "
style = 'fg:#eedd44 bg:#363008'
format = '[ $symbol($version )(\($virtualenv\) )]($style)'
pyenv_version_name = true

[nodejs]
symbol = " "
style = 'fg:#eedd44 bg:#363008'
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = " "
style = 'fg:#eedd44 bg:#363008'
format = '[ $symbol ($version) ]($style)'

[java]
symbol = " "
style = 'fg:#eedd44 bg:#363008'
format = '[ $symbol ($version) ]($style)'

[c]
symbol = " "
style = 'fg:#eedd44 bg:#363008'
format = '[ $symbol ($version) ]($style)'
detect_extensions = ['.c']

[docker_context]
symbol = " "
style = 'fg:#eedd44 bg:#363008'
format = '[ $symbol $context ]($style)'

[cmd_duration]
min_time = 2000
style = 'fg:#ccaa33 bg:#282200'
format = '[ вҸұ $duration ]($style)'

[time]
disabled = false
time_format = "%d/%m/%y %H:%M"
style = 'fg:#ccaa33 bg:#282200'
format = '[ уұ‘Қ $time ]($style)'

[battery]
disabled = false
full_symbol = 'уұҠЈ'
charging_symbol = 'уұҠҰ'
discharging_symbol = 'уұҠЈ'
format = '[ $symbol$percentage ]($style)'

[[battery.display]]
threshold = 100
style = 'fg:#ccaa33 bg:#282200'

[[battery.display]]
threshold = 50
charging_symbol = 'уұҠҘ'
discharging_symbol = 'уұҠў'
style = 'fg:#ccaa33 bg:#282200'

[[battery.display]]
threshold = 20
charging_symbol = 'уұҠӨ'
discharging_symbol = 'уұҠЎ'
style = 'fg:#ccaa33 bg:#282200'

[[battery.display]]
threshold = 10
charging_symbol = 'у°Ёң'
discharging_symbol = 'уҙғҚ'
style = 'bg:#c0392b'

[custom.giticon]
disabled = false
description = "Display symbol for remote Git server"
command = "check-git-remote.sh"
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
shell = ["bash", "--noprofile", "--norc"]
style = 'bg:#1e4418'
format = '[ $output ](fg:#aaee55 bg:#1e4418)'

[custom.cpp]
description = "custom C++ config"
command = 'echo '
detect_extensions = ['.h', '.hpp', 'cpp', '.cc']
style = 'fg:#eedd44 bg:#363008'
format = '[ $output ]($style)'
when = true

[custom.vpn]
disabled = false
command = 'echo  у°“„'
style = 'fg:#eedd44 bg:#363008'
format = '[ $output ]($style)'
when = 'ip route show | grep zcctun | awk "{ print $1 }" | grep "^53\." || daimler-vpn -s | grep -w "Connection Established"'

[custom.tmux_zoom]
disabled = false
description = "Show indicator when tmux pane is zoomed"
command = 'echo "у°–— zoom"'
style = 'fg:#eedd44 bg:#363008'
when = '[ -n "$TMUX" ] && [ "$(tmux display-message -p "#{window_zoomed_flag}")" = "1" ]'
format = '[ $output ]($style)'
shell = ["bash", "--noprofile", "--norc"]
