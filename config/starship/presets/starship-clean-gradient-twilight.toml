# ~/.config/starship.toml â€” clean آ· Twilight palette
# Evening sky: lavender â†’ violet â†’ indigo â†’ midnight
# Swap: cp starship-clean-gradient-twilight.toml starship.toml

add_newline = true
command_timeout = 1000

format = """
[â–‘â–’â–“](#8050e0)\
[ $os ](bg:#8050e0 fg:#0a0a0a)\
[î‚°](bg:#180c38 fg:#8050e0)\
$username\
$hostname\
$directory\
[î‚°](fg:#180c38 bg:#100c30)\
${custom.giticon}\
$git_branch\
$git_status\
[î‚°](fg:#100c30 bg:#0c0828)\
${custom.tmux_zoom}\
$python\
$nodejs\
$rust\
$java\
$c\
${custom.cpp}\
${custom.vpn}\
$docker_context\
[î‚°](fg:#0c0828 bg:#080820)\
$cmd_duration\
$battery\
$time\
[î‚°](fg:#080820)\
\n$character"""

continuation_prompt = '[â–¶â–¶](#8050e0) '

[fill]
symbol = 'â”€'
style = '#080818'

[character]
success_symbol = '[â‌¯](bold #a070ff)'
error_symbol = '[â‌¯](bold #ff4444)'

[os]
style = 'bg:#8050e0'
format = '$symbol'
disabled = false

[os.symbols]
Macos = 'َ°€µ'
Ubuntu = ""
Linux = ""

[username]
style_user = 'fg:#a070ff'
style_root = 'bold fg:#ff4444'
format = '[[ $user ](fg:#a070ff bg:#180c38)]($style)'
disabled = false
show_always = false

[hostname]
ssh_only = true
style = 'bg:#180c38'
format = '[[@$hostname ](fg:#a070ff bg:#180c38)]($style)'
disabled = false

[directory]
style = 'bg:#180c38'
format = '[[ $path ](fg:#a070ff bg:#180c38)]($style)'
truncation_length = 4
truncation_symbol = 'â€¦/'
fish_style_pwd_dir_length = 2
home_symbol = 'َ°‹œ ~'
read_only = ' َ°Œ¾'
read_only_style = 'fg:#a070ff bg:#180c38'

[directory.substitutions]
"Documents" = "َ°ˆ™ "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = " "
style = 'bg:#100c30'
format = '[[ $symbol$branch ](fg:#5848b0 bg:#100c30)]($style)'
truncation_symbol = 'â€¦/'

[git_status]
style = 'bg:#100c30'
format = '[[($all_status$ahead_behind )](fg:#5848b0 bg:#100c30)]($style)'
up_to_date = ''
ahead = 'â‡،${count}'
diverged = 'â‡•â‡،${ahead_count}â‡£${behind_count}'
behind = 'â‡£${count}'
staged = '+${count} '
modified = '~${count} '
untracked = '?${count} '
deleted = '-${count} '
conflicted = '!${count} '
stashed = '\$${count} '

[python]
symbol = " "
style = 'bg:#0c0828'
format = '[[ $symbol($version )(\($virtualenv\) )](fg:#4040a0 bg:#0c0828)]($style)'
pyenv_version_name = true

[nodejs]
symbol = " "
style = 'bg:#0c0828'
format = '[[ $symbol ($version) ](fg:#4040a0 bg:#0c0828)]($style)'

[rust]
symbol = " "
style = 'bg:#0c0828'
format = '[[ $symbol ($version) ](fg:#4040a0 bg:#0c0828)]($style)'

[java]
symbol = " "
style = 'bg:#0c0828'
format = '[[ $symbol ($version) ](fg:#4040a0 bg:#0c0828)]($style)'

[c]
symbol = " "
style = 'bg:#0c0828'
format = '[[ $symbol ($version) ](fg:#4040a0 bg:#0c0828)]($style)'
detect_extensions = ['.c']

[docker_context]
symbol = " "
style = 'bg:#0c0828'
format = '[[ $symbol $context ](fg:#4040a0 bg:#0c0828)]($style)'

[cmd_duration]
min_time = 2000
style = 'bg:#080820'
format = '[[ âڈ± $duration ](fg:#383890 bg:#080820)]($style)'

[time]
disabled = false
time_format = "%d/%m/%y %H:%M"
style = 'bg:#080820'
format = '[[  $time ](fg:#383890 bg:#080820)]($style)'

[battery]
disabled = false
full_symbol = 'َ±ٹ£'
charging_symbol = 'َ±ٹ¦'
discharging_symbol = 'َ±ٹ£'
format = '[[ $symbol$percentage ](fg:#383890 bg:#080820)]($style)'

[[battery.display]]
threshold = 100
style = 'bg:#080820'

[[battery.display]]
threshold = 50
charging_symbol = 'َ±ٹ¥'
discharging_symbol = 'َ±ٹ¢'
style = 'bg:#080820'

[[battery.display]]
threshold = 20
charging_symbol = 'َ±ٹ¤'
discharging_symbol = 'َ±ٹ،'
style = 'bg:#080820'

[[battery.display]]
threshold = 10
charging_symbol = 'َ°¨œ'
discharging_symbol = 'َ´ƒچ'
style = 'bg:#c0392b'

[custom.giticon]
disabled = false
description = "Display symbol for remote Git server"
command = "check-git-remote.sh"
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
shell = ["bash", "--noprofile", "--norc"]
style = 'bg:#100c30'
format = '[[ $output ](fg:#5848b0 bg:#100c30)]($style)'

[custom.cpp]
description = "custom C++ config"
command = 'echo '
detect_extensions = ['.h', '.hpp', 'cpp', '.cc']
style = 'bg:#0c0828'
format = '[[ $output ](fg:#4040a0 bg:#0c0828)]($style)'
when = true

[custom.vpn]
disabled = false
command = 'echo  َ°“„'
style = 'bg:#0c0828'
format = '[[ $output ](fg:#4040a0 bg:#0c0828)]($style)'
when = 'ip route show | grep zcctun | awk "{ print $1 }" | grep "^53\." || daimler-vpn -s | grep -w "Connection Established"'

[custom.tmux_zoom]
disabled = false
description = "Show indicator when tmux pane is zoomed"
command = 'echo "َ°–— zoom"'
style = 'bg:#0c0828'
when = '[ -n "$TMUX" ] && [ "$(tmux display-message -p "#{window_zoomed_flag}")" = "1" ]'
format = '[[ $output ](fg:#4040a0 bg:#0c0828)]($style)'
shell = ["bash", "--noprofile", "--norc"]
