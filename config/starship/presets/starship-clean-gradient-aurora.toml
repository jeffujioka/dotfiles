# ~/.config/starship.toml — clean · Aurora palette
# Northern lights: green → teal → blue → violet
# Swap: cp starship-clean-gradient-aurora.toml starship.toml

add_newline = true
command_timeout = 1000

format = """
[░▒▓](#00c860)\
[ $os ](bg:#00c860 fg:#0a0a0a)\
[](bg:#003818 fg:#00c860)\
$username\
$hostname\
$directory\
[](fg:#003818 bg:#083848)\
${custom.giticon}\
$git_branch\
$git_status\
[](fg:#083848 bg:#180840)\
${custom.tmux_zoom}\
$python\
$nodejs\
$rust\
$java\
$c\
${custom.cpp}\
${custom.vpn}\
$docker_context\
[](fg:#180840 bg:#100828)\
$cmd_duration\
$battery\
$time\
[](fg:#100828)\
\n$character"""

continuation_prompt = '[▶▶](#00c860) '

[fill]
symbol = '─'
style = '#081820'

[character]
success_symbol = '[❯](bold #00e888)'
error_symbol = '[❯](bold #ff4444)'

[os]
style = 'bg:#00c860'
format = '$symbol'
disabled = false

[os.symbols]
Macos = '󰀵'
Ubuntu = ""
Linux = ""

[username]
style_user = 'fg:#00e888'
style_root = 'bold fg:#ff4444'
format = '[[ $user ](fg:#00e888 bg:#003818)]($style)'
disabled = false
show_always = false

[hostname]
ssh_only = true
style = 'bg:#003818'
format = '[[@$hostname ](fg:#00e888 bg:#003818)]($style)'
disabled = false

[directory]
style = 'bg:#003818'
format = '[[ $path ](fg:#00e888 bg:#003818)]($style)'
truncation_length = 4
truncation_symbol = '…/'
fish_style_pwd_dir_length = 2
home_symbol = '󰋜 ~'
read_only = ' 󰌾'
read_only_style = 'fg:#00e888 bg:#003818'

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = " "
style = 'bg:#083848'
format = '[[ $symbol$branch ](fg:#20a8c0 bg:#083848)]($style)'
truncation_symbol = '…/'

[git_status]
style = 'bg:#083848'
format = '[[($all_status$ahead_behind )](fg:#20a8c0 bg:#083848)]($style)'
up_to_date = ''
ahead = '⇡${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
behind = '⇣${count}'
staged = '+${count} '
modified = '~${count} '
untracked = '?${count} '
deleted = '-${count} '
conflicted = '!${count} '
stashed = '\$${count} '

[python]
symbol = " "
style = 'bg:#180840'
format = '[[ $symbol($version )(\($virtualenv\) )](fg:#7060d0 bg:#180840)]($style)'
pyenv_version_name = true

[nodejs]
symbol = " "
style = 'bg:#180840'
format = '[[ $symbol ($version) ](fg:#7060d0 bg:#180840)]($style)'

[rust]
symbol = " "
style = 'bg:#180840'
format = '[[ $symbol ($version) ](fg:#7060d0 bg:#180840)]($style)'

[java]
symbol = " "
style = 'bg:#180840'
format = '[[ $symbol ($version) ](fg:#7060d0 bg:#180840)]($style)'

[c]
symbol = " "
style = 'bg:#180840'
format = '[[ $symbol ($version) ](fg:#7060d0 bg:#180840)]($style)'
detect_extensions = ['.c']

[docker_context]
symbol = " "
style = 'bg:#180840'
format = '[[ $symbol $context ](fg:#7060d0 bg:#180840)]($style)'

[cmd_duration]
min_time = 2000
style = 'bg:#100828'
format = '[[ ⏱ $duration ](fg:#9050b0 bg:#100828)]($style)'

[time]
disabled = false
time_format = "%d/%m/%y %H:%M"
style = 'bg:#100828'
format = '[[  $time ](fg:#9050b0 bg:#100828)]($style)'

[battery]
disabled = false
full_symbol = '󱊣'
charging_symbol = '󱊦'
discharging_symbol = '󱊣'
format = '[[ $symbol$percentage ](fg:#9050b0 bg:#100828)]($style)'

[[battery.display]]
threshold = 100
style = 'bg:#100828'

[[battery.display]]
threshold = 50
charging_symbol = '󱊥'
discharging_symbol = '󱊢'
style = 'bg:#100828'

[[battery.display]]
threshold = 20
charging_symbol = '󱊤'
discharging_symbol = '󱊡'
style = 'bg:#100828'

[[battery.display]]
threshold = 10
charging_symbol = '󰨜'
discharging_symbol = '󴃍'
style = 'bg:#c0392b'

[custom.giticon]
disabled = false
description = "Display symbol for remote Git server"
command = "check-git-remote.sh"
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
shell = ["bash", "--noprofile", "--norc"]
style = 'bg:#083848'
format = '[[ $output ](fg:#20a8c0 bg:#083848)]($style)'

[custom.cpp]
description = "custom C++ config"
command = 'echo '
detect_extensions = ['.h', '.hpp', 'cpp', '.cc']
style = 'bg:#180840'
format = '[[ $output ](fg:#7060d0 bg:#180840)]($style)'
when = true

[custom.vpn]
disabled = false
command = 'echo  󰓄'
style = 'bg:#180840'
format = '[[ $output ](fg:#7060d0 bg:#180840)]($style)'
when = 'ip route show | grep zcctun | awk "{ print $1 }" | grep "^53\." || daimler-vpn -s | grep -w "Connection Established"'

[custom.tmux_zoom]
disabled = false
description = "Show indicator when tmux pane is zoomed"
command = 'echo "󰖗 zoom"'
style = 'bg:#180840'
when = '[ -n "$TMUX" ] && [ "$(tmux display-message -p "#{window_zoomed_flag}")" = "1" ]'
format = '[[ $output ](fg:#7060d0 bg:#180840)]($style)'
shell = ["bash", "--noprofile", "--norc"]
