# ~/.config/starship.toml вҖ” bubble В· Twilight palette  В· deep В· dark hue-shift
# Evening sky: lavender вҶ’ violet вҶ’ indigo вҶ’ midnight
# Swap: starship-picker

add_newline = true
command_timeout = 1000

format = """
[оӮ¶](fg:#8040e0)[ $os ](fg:#0a0a0a bg:#8040e0)[оӮҙ](fg:#8040e0) \
[оӮ¶](fg:#180c30)$username\
$hostname\
$directory\
[оӮҙ](fg:#180c30) \
${custom.git_start}\
${custom.giticon}\
$git_branch\
$git_status\
${custom.git_end}\
${custom.tmux_zoom}\
$python\
$nodejs\
$rust\
$java\
$c\
${custom.cpp}\
${custom.vpn}\
$docker_context\
$fill\
[оӮ¶](fg:#060510)$cmd_duration\
$battery\
$time\
[оӮҙ](fg:#0c081e)\
\n$character"""

continuation_prompt = '[оӮ°оӮ°](#8040e0) '

[fill]
symbol = 'в”Җ'
style = '#060510'

[character]
success_symbol = '[вқҜ](bold #a070ff)'
error_symbol = '[вқҜ](bold #ff4444)'

[os]
style = 'bg:#8040e0'
format = '$symbol'
disabled = false

[os.symbols]
Macos = 'у°Җө'
Ubuntu = "оҜү"
Linux = "оҜҶ"

[username]
style_user = 'fg:#ddbbff'
style_root = 'bold fg:#ff4444'
format = '[[ $user ](fg:#ddbbff bg:#180c30)]($style)'
disabled = false
show_always = false

[hostname]
ssh_only = true
style = 'bg:#180c30'
format = '[[@$hostname ](fg:#ddbbff bg:#180c30)]($style)'
disabled = false

[directory]
style = 'bg:#180c30'
format = '[[ $path ](fg:#ddbbff bg:#180c30)]($style)'
truncation_length = 4
truncation_symbol = 'вҖҰ/'
fish_style_pwd_dir_length = 2
home_symbol = 'у°Ӣң ~'
read_only = ' у°Ңҫ'
read_only_style = 'fg:#ddbbff bg:#180c30'

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = " "
style = 'bg:#0e0822'
format = '[[ $symbol$branch ](fg:#8866ff bg:#0e0822)]($style)'
truncation_symbol = 'вҖҰ/'

[git_status]
style = 'bg:#0e0822'
format = '[[($all_status$ahead_behind )](fg:#8866ff bg:#0e0822)]($style)'
up_to_date = ''
ahead = 'вҮЎ${count}'
diverged = 'вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}'
behind = 'вҮЈ${count}'
staged = '+${count} '
modified = '~${count} '
untracked = '?${count} '
deleted = '-${count} '
conflicted = '!${count} '
stashed = '\$${count} '

[python]
symbol = " "
style = 'bg:#080618'
format = '[оӮ¶](fg:#080618)[ $symbol($version )(\($virtualenv\) ) ](fg:#6655cc bg:#080618)[оӮҙ](fg:#080618) '
pyenv_version_name = true

[nodejs]
symbol = " "
style = 'bg:#080618'
format = '[оӮ¶](fg:#080618)[ $symbol ($version) ](fg:#6655cc bg:#080618)[оӮҙ](fg:#080618) '

[rust]
symbol = " "
style = 'bg:#080618'
format = '[оӮ¶](fg:#080618)[ $symbol ($version) ](fg:#6655cc bg:#080618)[оӮҙ](fg:#080618) '

[java]
symbol = " "
style = 'bg:#080618'
format = '[оӮ¶](fg:#080618)[ $symbol ($version) ](fg:#6655cc bg:#080618)[оӮҙ](fg:#080618) '

[c]
symbol = " "
style = 'bg:#080618'
format = '[оӮ¶](fg:#080618)[ $symbol ($version) ](fg:#6655cc bg:#080618)[оӮҙ](fg:#080618) '
detect_extensions = ['.c']

[docker_context]
symbol = " "
style = 'bg:#080618'
format = '[оӮ¶](fg:#080618)[ $symbol $context ](fg:#6655cc bg:#080618)[оӮҙ](fg:#080618) '

[cmd_duration]
min_time = 2000
style = 'bg:#060510'
format = '[[ вҸұ $duration ](fg:#554499 bg:#060510)]($style)'

[time]
disabled = false
time_format = "%d/%m/%y %H:%M"
style = 'bg:#060510'
format = '[[  $time ](fg:#554499 bg:#060510)]($style)'

[battery]
disabled = false
full_symbol = 'уұҠЈ'
charging_symbol = 'уұҠҰ'
discharging_symbol = 'уұҠЈ'
format = '[[ $symbol$percentage ](fg:#554499 bg:#060510)]($style)'

[[battery.display]]
threshold = 100
style = 'bg:#060510'

[[battery.display]]
threshold = 50
charging_symbol = 'уұҠҘ'
discharging_symbol = 'уұҠў'
style = 'bg:#060510'

[[battery.display]]
threshold = 20
charging_symbol = 'уұҠӨ'
discharging_symbol = 'уұҠЎ'
style = 'bg:#060510'

[[battery.display]]
threshold = 10
charging_symbol = 'у°Ёң'
discharging_symbol = 'уҙғҚ'
style = 'bg:#c0392b'

[custom.git_start]
disabled = false
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
command = 'echo ""'
shell = ["bash", "--noprofile", "--norc"]
format = '[оӮ¶](fg:#0e0822)'

[custom.git_end]
disabled = false
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
command = 'echo ""'
shell = ["bash", "--noprofile", "--norc"]
format = '[оӮҙ](fg:#0e0822) '

[custom.giticon]
disabled = false
description = "Display symbol for remote Git server"
command = "check-git-remote.sh"
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
shell = ["bash", "--noprofile", "--norc"]
style = 'bg:#0e0822'
format = '[[ $output ](fg:#8866ff bg:#0e0822)]($style)'

[custom.cpp]
description = "custom C++ config"
command = 'echo '
detect_extensions = ['.h', '.hpp', 'cpp', '.cc']
style = 'bg:#080618'
format = '[оӮ¶](fg:#080618)[ $output ](fg:#6655cc bg:#080618)[оӮҙ](fg:#080618) '
when = true

[custom.vpn]
disabled = false
command = 'echo  у°“„'
style = 'bg:#080618'
format = '[оӮ¶](fg:#080618)[ $output ](fg:#6655cc bg:#080618)[оӮҙ](fg:#080618) '
when = 'ip route show | grep zcctun | awk "{ print $1 }" | grep "^53\." || daimler-vpn -s | grep -w "Connection Established"'

[custom.tmux_zoom]
disabled = false
description = "Show indicator when tmux pane is zoomed"
command = 'echo "у°–— zoom"'
style = 'bg:#080618'
when = '[ -n "$TMUX" ] && [ "$(tmux display-message -p "#{window_zoomed_flag}")" = "1" ]'
format = '[оӮ¶](fg:#080618)[ $output ](fg:#6655cc bg:#080618)[оӮҙ](fg:#080618) '
shell = ["bash", "--noprofile", "--norc"]
