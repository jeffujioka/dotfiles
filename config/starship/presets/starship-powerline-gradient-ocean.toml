# ~/.config/starship.toml ‚ÄĒ powerline ¬∑ Ocean palette
# Deep water: turquoise ‚Üí teal ‚Üí blue ‚Üí navy
# Swap: cp starship-powerline-gradient-ocean.toml starship.toml

add_newline = true
command_timeout = 1000

format = """
[Óā∂](#083028)\
$os\
$username\
$hostname\
[Óāį](bg:#082830 fg:#083028)\
$directory\
[Óāį](fg:#082830 bg:#081828)\
${custom.giticon}\
$git_branch\
$git_status\
[Óāį](fg:#081828 bg:#081028)\
${custom.tmux_zoom}\
$python\
$nodejs\
$rust\
$java\
$c\
${custom.cpp}\
${custom.vpn}\
$docker_context\
[Óāį](fg:#081028)\
$fill\
[Óā≤](fg:#080c20)\
$cmd_duration\
$battery\
$time\
[Óāī](fg:#080c20)\
\n$character"""

continuation_prompt = '[ÓāįÓāį](#0aa0c0) '

[fill]
symbol = '‚ĒÄ'
style = '#040c18'

[character]
success_symbol = '[‚ĚĮ](bold #40e0d0)'
error_symbol = '[‚ĚĮ](bold #ff4444)'

[os]
style = 'bg:#083028'
format = '[ $symbol ]($style)'
disabled = false

[os.symbols]
Macos = 'ůįÄĶ'
Ubuntu = "ÓĮČ"
Linux = "ÓĮÜ"

[username]
style_user = 'bg:#083028'
style_root = 'bg:#083028'
format = '[ $user]($style)'
disabled = false
show_always = false

[hostname]
ssh_only = true
style = 'bg:#083028'
format = '[@$hostname ]($style)'
disabled = false

[directory]
style = 'bg:#082830'
format = '[ $path ]($style)'
truncation_length = 4
truncation_symbol = '‚Ä¶/'
fish_style_pwd_dir_length = 2
home_symbol = 'ůįčú ~'
read_only = ' ůįĆĺ '
read_only_style = 'bg:#082830'

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = " "
style = 'bg:#081828'
format = '[ $symbol$branch ](fg:#80e0d0 bg:#081828)'
truncation_symbol = '‚Ä¶/'

[git_status]
style = 'bg:#081828'
format = '[$all_status$ahead_behind ](fg:#80e0d0 bg:#081828)'
up_to_date = ''
ahead = '‚á°${count}'
diverged = '‚áē‚á°${ahead_count}‚á£${behind_count}'
behind = '‚á£${count}'
staged = '+${count} '
modified = '~${count} '
untracked = '?${count} '
deleted = '-${count} '
conflicted = '!${count} '
stashed = '\$${count} '

[python]
symbol = " "
style = 'bg:#081028'
format = '[ $symbol($version )(\($virtualenv\) )]($style)'
pyenv_version_name = true

[nodejs]
symbol = " "
style = 'bg:#081028'
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = " "
style = 'bg:#081028'
format = '[ $symbol ($version) ]($style)'

[java]
symbol = " "
style = 'bg:#081028'
format = '[ $symbol ($version) ]($style)'

[c]
symbol = " "
style = 'bg:#081028'
format = '[ $symbol ($version) ]($style)'
detect_extensions = ['.c']

[docker_context]
symbol = " "
style = 'bg:#081028'
format = '[ $symbol $context ]($style)'

[cmd_duration]
min_time = 2000
style = 'bg:#080c20'
format = '[ ‚ŹĪ $duration ]($style)'

[time]
disabled = false
time_format = "%d/%m/%y %H:%M"
style = 'bg:#080c20'
format = '[ ůĪĎć $time ]($style)'

[battery]
disabled = false
full_symbol = 'ůĪä£'
charging_symbol = 'ůĪä¶'
discharging_symbol = 'ůĪä£'
format = '[ $symbol$percentage ]($style)'

[[battery.display]]
threshold = 100
style = 'bg:#080c20'

[[battery.display]]
threshold = 50
charging_symbol = 'ůĪä•'
discharging_symbol = 'ůĪäĘ'
style = 'bg:#080c20'

[[battery.display]]
threshold = 20
charging_symbol = 'ůĪä§'
discharging_symbol = 'ůĪä°'
style = 'bg:#080c20'

[[battery.display]]
threshold = 10
charging_symbol = 'ůį®ú'
discharging_symbol = 'ůīÉć'
style = 'bg:#c0392b'

[custom.giticon]
disabled = false
description = "Display symbol for remote Git server"
command = "check-git-remote.sh"
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
shell = ["bash", "--noprofile", "--norc"]
style = 'bg:#081828'
format = '[ $output ](fg:#80e0d0 bg:#081828)'

[custom.cpp]
description = "custom C++ config"
command = 'echo '
detect_extensions = ['.h', '.hpp', 'cpp', '.cc']
style = 'bg:#081028'
format = '[ $output ]($style)'
when = true

[custom.vpn]
disabled = false
command = 'echo  ůįďĄ'
style = 'bg:#081028'
format = '[ $output ]($style)'
when = 'ip route show | grep zcctun | awk "{ print $1 }" | grep "^53\." || daimler-vpn -s | grep -w "Connection Established"'

[custom.tmux_zoom]
disabled = false
description = "Show indicator when tmux pane is zoomed"
command = 'echo "ůįĖó zoom"'
style = 'bg:#081028'
when = '[ -n "$TMUX" ] && [ "$(tmux display-message -p "#{window_zoomed_flag}")" = "1" ]'
format = '[ $output ]($style)'
shell = ["bash", "--noprofile", "--norc"]
