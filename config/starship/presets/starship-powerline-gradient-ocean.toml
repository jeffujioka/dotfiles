# ~/.config/starship.toml â€” powerline آ· Ocean palette
# Deep water: turquoise â†’ teal â†’ blue â†’ navy
# Swap: cp starship-powerline-gradient-ocean.toml starship.toml

add_newline = true
command_timeout = 1000

format = """
[î‚¶](#083028)\
$os\
$username\
$hostname\
[î‚°](bg:#082830 fg:#083028)\
$directory\
[î‚°](fg:#082830 bg:#081828)\
${custom.giticon}\
$git_branch\
$git_status\
[î‚°](fg:#081828 bg:#081028)\
${custom.tmux_zoom}\
$python\
$nodejs\
$rust\
$java\
$c\
${custom.cpp}\
${custom.vpn}\
$docker_context\
[î‚°](fg:#081028)\
$fill\
[î‚°](fg:#080c20)\
$cmd_duration\
$battery\
$time\
[î‚°](fg:#080c20)\
\n$character"""

continuation_prompt = '[â–¶â–¶](#0aa0c0) '

[fill]
symbol = 'â”€'
style = '#040c18'

[character]
success_symbol = '[â‌¯](bold #40e0d0)'
error_symbol = '[â‌¯](bold #ff4444)'

[os]
style = 'bg:#083028'
format = '[ $symbol ]($style)'
disabled = false

[os.symbols]
Macos = 'َ°€µ'
Ubuntu = ""
Linux = ""

[username]
style_user = 'bg:#083028'
style_root = 'bg:#083028'
format = '[$user ]($style)'
disabled = false
show_always = false

[hostname]
ssh_only = true
style = 'bg:#083028'
format = '[@$hostname ]($style)'
disabled = false

[directory]
style = 'bg:#082830'
format = '[ $path ]($style)'
truncation_length = 4
truncation_symbol = 'â€¦/'
fish_style_pwd_dir_length = 2
home_symbol = 'َ°‹œ ~'
read_only = ' َ°Œ¾ '
read_only_style = 'bg:#082830'

[directory.substitutions]
"Documents" = "َ°ˆ™ "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = " "
style = 'bg:#081828'
format = '[ $symbol$branch ](fg:#80e0d0 bg:#081828)'
truncation_symbol = 'â€¦/'

[git_status]
style = 'bg:#081828'
format = '[$all_status$ahead_behind ](fg:#80e0d0 bg:#081828)'
up_to_date = ''
ahead = 'â‡،${count}'
diverged = 'â‡•â‡،${ahead_count}â‡£${behind_count}'
behind = 'â‡£${count}'
staged = '+${count} '
modified = '~${count} '
untracked = '?${count} '
deleted = '-${count} '
conflicted = '!${count} '
stashed = '\$${count} '

[python]
symbol = " "
style = 'bg:#081028'
format = '[ $symbol($version )(\($virtualenv\) )]($style)'
pyenv_version_name = true

[nodejs]
symbol = " "
style = 'bg:#081028'
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = " "
style = 'bg:#081028'
format = '[ $symbol ($version) ]($style)'

[java]
symbol = " "
style = 'bg:#081028'
format = '[ $symbol ($version) ]($style)'

[c]
symbol = " "
style = 'bg:#081028'
format = '[ $symbol ($version) ]($style)'
detect_extensions = ['.c']

[docker_context]
symbol = " "
style = 'bg:#081028'
format = '[ $symbol $context ]($style)'

[cmd_duration]
min_time = 2000
style = 'bg:#080c20'
format = '[ âڈ± $duration ]($style)'

[time]
disabled = false
time_format = "%d/%m/%y %H:%M"
style = 'bg:#080c20'
format = '[ َ±‘چ $time ]($style)'

[battery]
disabled = false
full_symbol = 'َ±ٹ£'
charging_symbol = 'َ±ٹ¦'
discharging_symbol = 'َ±ٹ£'
format = '[ $symbol$percentage ]($style)'

[[battery.display]]
threshold = 100
style = 'bg:#080c20'

[[battery.display]]
threshold = 50
charging_symbol = 'َ±ٹ¥'
discharging_symbol = 'َ±ٹ¢'
style = 'bg:#080c20'

[[battery.display]]
threshold = 20
charging_symbol = 'َ±ٹ¤'
discharging_symbol = 'َ±ٹ،'
style = 'bg:#080c20'

[[battery.display]]
threshold = 10
charging_symbol = 'َ°¨œ'
discharging_symbol = 'َ´ƒچ'
style = 'bg:#c0392b'

[custom.giticon]
disabled = false
description = "Display symbol for remote Git server"
command = "check-git-remote.sh"
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
shell = ["bash", "--noprofile", "--norc"]
style = 'bg:#081828'
format = '[ $output ](fg:#80e0d0 bg:#081828)'

[custom.cpp]
description = "custom C++ config"
command = 'echo '
detect_extensions = ['.h', '.hpp', 'cpp', '.cc']
style = 'bg:#081028'
format = '[ $output ]($style)'
when = true

[custom.vpn]
disabled = false
command = 'echo  َ°“„'
style = 'bg:#081028'
format = '[ $output ]($style)'
when = 'ip route show | grep zcctun | awk "{ print $1 }" | grep "^53\." || daimler-vpn -s | grep -w "Connection Established"'

[custom.tmux_zoom]
disabled = false
description = "Show indicator when tmux pane is zoomed"
command = 'echo "َ°–— zoom"'
style = 'bg:#081028'
when = '[ -n "$TMUX" ] && [ "$(tmux display-message -p "#{window_zoomed_flag}")" = "1" ]'
format = '[ $output ]($style)'
shell = ["bash", "--noprofile", "--norc"]
