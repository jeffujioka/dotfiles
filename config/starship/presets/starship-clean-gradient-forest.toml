# ~/.config/starship.toml — clean · Forest palette
# Woodland: canopy → moss → earth
# Swap: cp starship-clean-gradient-forest.toml starship.toml

add_newline = true
command_timeout = 1000

format = """
[░▒▓](#10c050)\
[ $os ](bg:#10c050 fg:#0a0a0a)\
[](bg:#0a2810 fg:#10c050)\
$username\
$hostname\
$directory\
[](fg:#0a2810 bg:#081c14)\
${custom.giticon}\
$git_branch\
$git_status\
[](fg:#081c14 bg:#0c1810)\
${custom.tmux_zoom}\
$python\
$nodejs\
$rust\
$java\
$c\
${custom.cpp}\
${custom.vpn}\
$docker_context\
[](fg:#0c1810 bg:#18140c)\
$cmd_duration\
$battery\
$time\
[](fg:#18140c)\
\n$character"""

continuation_prompt = '[▶▶](#10c050) '

[fill]
symbol = '─'
style = '#081008'

[character]
success_symbol = '[❯](bold #50c868)'
error_symbol = '[❯](bold #ff4444)'

[os]
style = 'bg:#10c050'
format = '$symbol'
disabled = false

[os.symbols]
Macos = '󰀵'
Ubuntu = ""
Linux = ""

[username]
style_user = 'fg:#50c868'
style_root = 'bold fg:#ff4444'
format = '[[ $user ](fg:#50c868 bg:#0a2810)]($style)'
disabled = false
show_always = false

[hostname]
ssh_only = true
style = 'bg:#0a2810'
format = '[[@$hostname ](fg:#50c868 bg:#0a2810)]($style)'
disabled = false

[directory]
style = 'bg:#0a2810'
format = '[[ $path ](fg:#50c868 bg:#0a2810)]($style)'
truncation_length = 4
truncation_symbol = '…/'
fish_style_pwd_dir_length = 2
home_symbol = '󰋜 ~'
read_only = ' 󰌾'
read_only_style = 'fg:#50c868 bg:#0a2810'

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = " "
style = 'bg:#081c14'
format = '[[ $symbol$branch ](fg:#2d8860 bg:#081c14)]($style)'
truncation_symbol = '…/'

[git_status]
style = 'bg:#081c14'
format = '[[($all_status$ahead_behind )](fg:#2d8860 bg:#081c14)]($style)'
up_to_date = ''
ahead = '⇡${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
behind = '⇣${count}'
staged = '+${count} '
modified = '~${count} '
untracked = '?${count} '
deleted = '-${count} '
conflicted = '!${count} '
stashed = '\$${count} '

[python]
symbol = " "
style = 'bg:#0c1810'
format = '[[ $symbol($version )(\($virtualenv\) )](fg:#408060 bg:#0c1810)]($style)'
pyenv_version_name = true

[nodejs]
symbol = " "
style = 'bg:#0c1810'
format = '[[ $symbol ($version) ](fg:#408060 bg:#0c1810)]($style)'

[rust]
symbol = " "
style = 'bg:#0c1810'
format = '[[ $symbol ($version) ](fg:#408060 bg:#0c1810)]($style)'

[java]
symbol = " "
style = 'bg:#0c1810'
format = '[[ $symbol ($version) ](fg:#408060 bg:#0c1810)]($style)'

[c]
symbol = " "
style = 'bg:#0c1810'
format = '[[ $symbol ($version) ](fg:#408060 bg:#0c1810)]($style)'
detect_extensions = ['.c']

[docker_context]
symbol = " "
style = 'bg:#0c1810'
format = '[[ $symbol $context ](fg:#408060 bg:#0c1810)]($style)'

[cmd_duration]
min_time = 2000
style = 'bg:#18140c'
format = '[[ ⏱ $duration ](fg:#907850 bg:#18140c)]($style)'

[time]
disabled = false
time_format = "%d/%m/%y %H:%M"
style = 'bg:#18140c'
format = '[[  $time ](fg:#907850 bg:#18140c)]($style)'

[battery]
disabled = false
full_symbol = '󱊣'
charging_symbol = '󱊦'
discharging_symbol = '󱊣'
format = '[[ $symbol$percentage ](fg:#907850 bg:#18140c)]($style)'

[[battery.display]]
threshold = 100
style = 'bg:#18140c'

[[battery.display]]
threshold = 50
charging_symbol = '󱊥'
discharging_symbol = '󱊢'
style = 'bg:#18140c'

[[battery.display]]
threshold = 20
charging_symbol = '󱊤'
discharging_symbol = '󱊡'
style = 'bg:#18140c'

[[battery.display]]
threshold = 10
charging_symbol = '󰨜'
discharging_symbol = '󴃍'
style = 'bg:#c0392b'

[custom.giticon]
disabled = false
description = "Display symbol for remote Git server"
command = "check-git-remote.sh"
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
shell = ["bash", "--noprofile", "--norc"]
style = 'bg:#081c14'
format = '[[ $output ](fg:#2d8860 bg:#081c14)]($style)'

[custom.cpp]
description = "custom C++ config"
command = 'echo '
detect_extensions = ['.h', '.hpp', 'cpp', '.cc']
style = 'bg:#0c1810'
format = '[[ $output ](fg:#408060 bg:#0c1810)]($style)'
when = true

[custom.vpn]
disabled = false
command = 'echo  󰓄'
style = 'bg:#0c1810'
format = '[[ $output ](fg:#408060 bg:#0c1810)]($style)'
when = 'ip route show | grep zcctun | awk "{ print $1 }" | grep "^53\." || daimler-vpn -s | grep -w "Connection Established"'

[custom.tmux_zoom]
disabled = false
description = "Show indicator when tmux pane is zoomed"
command = 'echo "󰖗 zoom"'
style = 'bg:#0c1810'
when = '[ -n "$TMUX" ] && [ "$(tmux display-message -p "#{window_zoomed_flag}")" = "1" ]'
format = '[[ $output ](fg:#408060 bg:#0c1810)]($style)'
shell = ["bash", "--noprofile", "--norc"]
