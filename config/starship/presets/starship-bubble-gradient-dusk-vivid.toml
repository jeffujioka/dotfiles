# ~/.config/starship.toml вҖ” bubble В· Dusk palette  В· vivid В· high contrast
# Warm sunset: coral вҶ’ rose вҶ’ plum вҶ’ indigo
# Swap: starship-picker

add_newline = true
command_timeout = 1000

format = """
[оӮ¶](fg:#f06080)[ $os ](fg:#0a0a0a bg:#f06080)[оӮҙ](fg:#f06080) \
[оӮ¶](fg:#741c2e)$username\
$hostname\
$directory\
[оӮҙ](fg:#741c2e) \
${custom.git_start}\
${custom.giticon}\
$git_branch\
$git_status\
${custom.git_end}\
${custom.tmux_zoom}\
$python\
$nodejs\
$rust\
$java\
$c\
${custom.cpp}\
${custom.vpn}\
$docker_context\
$fill\
[оӮ¶](fg:#200c58)$cmd_duration\
$battery\
$time\
[оӮҙ](fg:#0c081e)\
\n$character"""

continuation_prompt = '[оӮ°оӮ°](#f06080) '

[fill]
symbol = 'в”Җ'
style = '#200c58'

[character]
success_symbol = '[вқҜ](bold #ff9088)'
error_symbol = '[вқҜ](bold #ff4444)'

[os]
style = 'bg:#f06080'
format = '$symbol'
disabled = false

[os.symbols]
Macos = 'у°Җө'
Ubuntu = "оҜү"
Linux = "оҜҶ"

[username]
style_user = 'fg:#ffcc99'
style_root = 'bold fg:#ff4444'
format = '[[ $user ](fg:#ffcc99 bg:#741c2e)]($style)'
disabled = false
show_always = false

[hostname]
ssh_only = true
style = 'bg:#741c2e'
format = '[[@$hostname ](fg:#ffcc99 bg:#741c2e)]($style)'
disabled = false

[directory]
style = 'bg:#741c2e'
format = '[[ $path ](fg:#ffcc99 bg:#741c2e)]($style)'
truncation_length = 4
truncation_symbol = 'вҖҰ/'
fish_style_pwd_dir_length = 2
home_symbol = 'у°Ӣң ~'
read_only = ' у°Ңҫ'
read_only_style = 'fg:#ffcc99 bg:#741c2e'

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = " "
style = 'bg:#541460'
format = '[[ $symbol$branch ](fg:#ee77dd bg:#541460)]($style)'
truncation_symbol = 'вҖҰ/'

[git_status]
style = 'bg:#541460'
format = '[[($all_status$ahead_behind )](fg:#ee77dd bg:#541460)]($style)'
up_to_date = ''
ahead = 'вҮЎ${count}'
diverged = 'вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}'
behind = 'вҮЈ${count}'
staged = '+${count} '
modified = '~${count} '
untracked = '?${count} '
deleted = '-${count} '
conflicted = '!${count} '
stashed = '\$${count} '

[python]
symbol = " "
style = 'bg:#380c78'
format = '[оӮ¶](fg:#380c78)[ $symbol($version )(\($virtualenv\) ) ](fg:#bb88ff bg:#380c78)[оӮҙ](fg:#380c78) '
pyenv_version_name = true

[nodejs]
symbol = " "
style = 'bg:#380c78'
format = '[оӮ¶](fg:#380c78)[ $symbol ($version) ](fg:#bb88ff bg:#380c78)[оӮҙ](fg:#380c78) '

[rust]
symbol = " "
style = 'bg:#380c78'
format = '[оӮ¶](fg:#380c78)[ $symbol ($version) ](fg:#bb88ff bg:#380c78)[оӮҙ](fg:#380c78) '

[java]
symbol = " "
style = 'bg:#380c78'
format = '[оӮ¶](fg:#380c78)[ $symbol ($version) ](fg:#bb88ff bg:#380c78)[оӮҙ](fg:#380c78) '

[c]
symbol = " "
style = 'bg:#380c78'
format = '[оӮ¶](fg:#380c78)[ $symbol ($version) ](fg:#bb88ff bg:#380c78)[оӮҙ](fg:#380c78) '
detect_extensions = ['.c']

[docker_context]
symbol = " "
style = 'bg:#380c78'
format = '[оӮ¶](fg:#380c78)[ $symbol $context ](fg:#bb88ff bg:#380c78)[оӮҙ](fg:#380c78) '

[cmd_duration]
min_time = 2000
style = 'bg:#200c58'
format = '[[ вҸұ $duration ](fg:#9977ee bg:#200c58)]($style)'

[time]
disabled = false
time_format = "%d/%m/%y %H:%M"
style = 'bg:#200c58'
format = '[[  $time ](fg:#9977ee bg:#200c58)]($style)'

[battery]
disabled = false
full_symbol = 'уұҠЈ'
charging_symbol = 'уұҠҰ'
discharging_symbol = 'уұҠЈ'
format = '[[ $symbol$percentage ](fg:#9977ee bg:#200c58)]($style)'

[[battery.display]]
threshold = 100
style = 'bg:#200c58'

[[battery.display]]
threshold = 50
charging_symbol = 'уұҠҘ'
discharging_symbol = 'уұҠў'
style = 'bg:#200c58'

[[battery.display]]
threshold = 20
charging_symbol = 'уұҠӨ'
discharging_symbol = 'уұҠЎ'
style = 'bg:#200c58'

[[battery.display]]
threshold = 10
charging_symbol = 'у°Ёң'
discharging_symbol = 'уҙғҚ'
style = 'bg:#c0392b'

[custom.git_start]
disabled = false
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
command = 'echo ""'
shell = ["bash", "--noprofile", "--norc"]
format = '[оӮ¶](fg:#541460)'

[custom.git_end]
disabled = false
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
command = 'echo ""'
shell = ["bash", "--noprofile", "--norc"]
format = '[оӮҙ](fg:#541460) '

[custom.giticon]
disabled = false
description = "Display symbol for remote Git server"
command = "check-git-remote.sh"
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
shell = ["bash", "--noprofile", "--norc"]
style = 'bg:#541460'
format = '[[ $output ](fg:#ee77dd bg:#541460)]($style)'

[custom.cpp]
description = "custom C++ config"
command = 'echo '
detect_extensions = ['.h', '.hpp', 'cpp', '.cc']
style = 'bg:#380c78'
format = '[оӮ¶](fg:#380c78)[ $output ](fg:#bb88ff bg:#380c78)[оӮҙ](fg:#380c78) '
when = true

[custom.vpn]
disabled = false
command = 'echo  у°“„'
style = 'bg:#380c78'
format = '[оӮ¶](fg:#380c78)[ $output ](fg:#bb88ff bg:#380c78)[оӮҙ](fg:#380c78) '
when = 'ip route show | grep zcctun | awk "{ print $1 }" | grep "^53\." || daimler-vpn -s | grep -w "Connection Established"'

[custom.tmux_zoom]
disabled = false
description = "Show indicator when tmux pane is zoomed"
command = 'echo "у°–— zoom"'
style = 'bg:#380c78'
when = '[ -n "$TMUX" ] && [ "$(tmux display-message -p "#{window_zoomed_flag}")" = "1" ]'
format = '[оӮ¶](fg:#380c78)[ $output ](fg:#bb88ff bg:#380c78)[оӮҙ](fg:#380c78) '
shell = ["bash", "--noprofile", "--norc"]
