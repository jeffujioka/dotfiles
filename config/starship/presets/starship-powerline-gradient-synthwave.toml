# ~/.config/starship.toml â€” powerline آ· Synthwave palette
# Retro-futuristic: neon pink â†’ magenta â†’ violet â†’ cyan
# Swap: cp starship-powerline-gradient-synthwave.toml starship.toml

add_newline = true
command_timeout = 1000

format = """
[î‚¶](#300830)\
$os\
$username\
$hostname\
[î‚°](bg:#280838 fg:#300830)\
$directory\
[î‚°](fg:#280838 bg:#180840)\
${custom.giticon}\
$git_branch\
$git_status\
[î‚°](fg:#180840 bg:#080838)\
${custom.tmux_zoom}\
$python\
$nodejs\
$rust\
$java\
$c\
${custom.cpp}\
${custom.vpn}\
$docker_context\
[î‚°](fg:#080838)\
$fill\
[î‚°](fg:#083030)\
$cmd_duration\
$battery\
$time\
[î‚°](fg:#083030)\
\n$character"""

continuation_prompt = '[â–¶â–¶](#c00a7a) '

[fill]
symbol = 'â”€'
style = '#080818'

[character]
success_symbol = '[â‌¯](bold #ff60d0)'
error_symbol = '[â‌¯](bold #ff4444)'

[os]
style = 'bg:#300830'
format = '[ $symbol ]($style)'
disabled = false

[os.symbols]
Macos = 'َ°€µ'
Ubuntu = ""
Linux = ""

[username]
style_user = 'bg:#300830'
style_root = 'bg:#300830'
format = '[$user ]($style)'
disabled = false
show_always = false

[hostname]
ssh_only = true
style = 'bg:#300830'
format = '[@$hostname ]($style)'
disabled = false

[directory]
style = 'bg:#280838'
format = '[ $path ]($style)'
truncation_length = 4
truncation_symbol = 'â€¦/'
fish_style_pwd_dir_length = 2
home_symbol = 'َ°‹œ ~'
read_only = ' َ°Œ¾ '
read_only_style = 'bg:#280838'

[directory.substitutions]
"Documents" = "َ°ˆ™ "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = " "
style = 'bg:#180840'
format = '[ $symbol$branch ](fg:#ff90e0 bg:#180840)'
truncation_symbol = 'â€¦/'

[git_status]
style = 'bg:#180840'
format = '[$all_status$ahead_behind ](fg:#ff90e0 bg:#180840)'
up_to_date = ''
ahead = 'â‡،${count}'
diverged = 'â‡•â‡،${ahead_count}â‡£${behind_count}'
behind = 'â‡£${count}'
staged = '+${count} '
modified = '~${count} '
untracked = '?${count} '
deleted = '-${count} '
conflicted = '!${count} '
stashed = '\$${count} '

[python]
symbol = " "
style = 'bg:#080838'
format = '[ $symbol($version )(\($virtualenv\) )]($style)'
pyenv_version_name = true

[nodejs]
symbol = " "
style = 'bg:#080838'
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = " "
style = 'bg:#080838'
format = '[ $symbol ($version) ]($style)'

[java]
symbol = " "
style = 'bg:#080838'
format = '[ $symbol ($version) ]($style)'

[c]
symbol = " "
style = 'bg:#080838'
format = '[ $symbol ($version) ]($style)'
detect_extensions = ['.c']

[docker_context]
symbol = " "
style = 'bg:#080838'
format = '[ $symbol $context ]($style)'

[cmd_duration]
min_time = 2000
style = 'bg:#083030'
format = '[ âڈ± $duration ]($style)'

[time]
disabled = false
time_format = "%d/%m/%y %H:%M"
style = 'bg:#083030'
format = '[ َ±‘چ $time ]($style)'

[battery]
disabled = false
full_symbol = 'َ±ٹ£'
charging_symbol = 'َ±ٹ¦'
discharging_symbol = 'َ±ٹ£'
format = '[ $symbol$percentage ]($style)'

[[battery.display]]
threshold = 100
style = 'bg:#083030'

[[battery.display]]
threshold = 50
charging_symbol = 'َ±ٹ¥'
discharging_symbol = 'َ±ٹ¢'
style = 'bg:#083030'

[[battery.display]]
threshold = 20
charging_symbol = 'َ±ٹ¤'
discharging_symbol = 'َ±ٹ،'
style = 'bg:#083030'

[[battery.display]]
threshold = 10
charging_symbol = 'َ°¨œ'
discharging_symbol = 'َ´ƒچ'
style = 'bg:#c0392b'

[custom.giticon]
disabled = false
description = "Display symbol for remote Git server"
command = "check-git-remote.sh"
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
shell = ["bash", "--noprofile", "--norc"]
style = 'bg:#180840'
format = '[ $output ](fg:#ff90e0 bg:#180840)'

[custom.cpp]
description = "custom C++ config"
command = 'echo '
detect_extensions = ['.h', '.hpp', 'cpp', '.cc']
style = 'bg:#080838'
format = '[ $output ]($style)'
when = true

[custom.vpn]
disabled = false
command = 'echo  َ°“„'
style = 'bg:#080838'
format = '[ $output ]($style)'
when = 'ip route show | grep zcctun | awk "{ print $1 }" | grep "^53\." || daimler-vpn -s | grep -w "Connection Established"'

[custom.tmux_zoom]
disabled = false
description = "Show indicator when tmux pane is zoomed"
command = 'echo "َ°–— zoom"'
style = 'bg:#080838'
when = '[ -n "$TMUX" ] && [ "$(tmux display-message -p "#{window_zoomed_flag}")" = "1" ]'
format = '[ $output ]($style)'
shell = ["bash", "--noprofile", "--norc"]
