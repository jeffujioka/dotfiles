# ~/.config/starship.toml ÔÇö powerline ┬À Aurora palette  ┬À glow ┬À medium contrast
# Northern lights: green ÔåÆ teal ÔåÆ blue ÔåÆ violet
# Swap: starship-picker

add_newline = true
command_timeout = 1000

format = """
[¯éÂ](#005028)\
$os\
$username\
$hostname\
[¯é░](bg:#005058 fg:#005028)\
$directory\
[¯é░](fg:#005058 bg:#0c2e68)\
${custom.giticon}\
$git_branch\
$git_status\
[¯é░](fg:#0c2e68 bg:#1c0858)\
${custom.tmux_zoom}\
$python\
$nodejs\
$rust\
$java\
$c\
${custom.cpp}\
${custom.vpn}\
$docker_context\
[¯é░](fg:#1c0858)\
$fill\
[¯é▓](fg:#120840)\
$cmd_duration\
$battery\
$time\
[¯é┤](fg:#120840)\
\n$character"""

continuation_prompt = '[¯é░¯é░](#00c860) '

[fill]
symbol = 'ÔöÇ'
style = '#090418'

[character]
success_symbol = '[ÔØ»](bold #00e888)'
error_symbol = '[ÔØ»](bold #ff4444)'

[os]
style = 'fg:#55ffaa bg:#005028'
format = '[ $symbol ]($style)'
disabled = false

[os.symbols]
Macos = '¾░ÇÁ'
Ubuntu = "¯»ë"
Linux = "¯»å"

[username]
style_user = 'fg:#55ffaa bg:#005028'
style_root = 'fg:#55ffaa bg:#005028'
format = '[ $user]($style)'
disabled = false
show_always = false

[hostname]
ssh_only = true
style = 'fg:#55ffaa bg:#005028'
format = '[@$hostname ]($style)'
disabled = false

[directory]
style = 'fg:#44eedd bg:#005058'
format = '[ $path ]($style)'
truncation_length = 4
truncation_symbol = 'ÔÇª/'
fish_style_pwd_dir_length = 2
home_symbol = '¾░ï£ ~'
read_only = ' ¾░î¥ '
read_only_style = 'fg:#44eedd bg:#005058'

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = " "
style = 'bg:#0c2e68'
format = '[ $symbol$branch ](fg:#88bbff bg:#0c2e68)'
truncation_symbol = 'ÔÇª/'

[git_status]
style = 'bg:#0c2e68'
format = '[$all_status$ahead_behind ](fg:#88bbff bg:#0c2e68)'
up_to_date = ''
ahead = 'Ôçí${count}'
diverged = 'ÔçòÔçí${ahead_count}Ôçú${behind_count}'
behind = 'Ôçú${count}'
staged = '+${count} '
modified = '~${count} '
untracked = '?${count} '
deleted = '-${count} '
conflicted = '!${count} '
stashed = '\$${count} '

[python]
symbol = " "
style = 'fg:#cc88ff bg:#1c0858'
format = '[ $symbol($version )(\($virtualenv\) )]($style)'
pyenv_version_name = true

[nodejs]
symbol = " "
style = 'fg:#cc88ff bg:#1c0858'
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = " "
style = 'fg:#cc88ff bg:#1c0858'
format = '[ $symbol ($version) ]($style)'

[java]
symbol = " "
style = 'fg:#cc88ff bg:#1c0858'
format = '[ $symbol ($version) ]($style)'

[c]
symbol = " "
style = 'fg:#cc88ff bg:#1c0858'
format = '[ $symbol ($version) ]($style)'
detect_extensions = ['.c']

[docker_context]
symbol = " "
style = 'fg:#cc88ff bg:#1c0858'
format = '[ $symbol $context ]($style)'

[cmd_duration]
min_time = 2000
style = 'fg:#9966dd bg:#120840'
format = '[ ÔÅ▒ $duration ]($style)'

[time]
disabled = false
time_format = "%d/%m/%y %H:%M"
style = 'fg:#9966dd bg:#120840'
format = '[ ¾▒æì $time ]($style)'

[battery]
disabled = false
full_symbol = '¾▒èú'
charging_symbol = '¾▒èª'
discharging_symbol = '¾▒èú'
format = '[ $symbol$percentage ]($style)'

[[battery.display]]
threshold = 100
style = 'fg:#9966dd bg:#120840'

[[battery.display]]
threshold = 50
charging_symbol = '¾▒èÑ'
discharging_symbol = '¾▒èó'
style = 'fg:#9966dd bg:#120840'

[[battery.display]]
threshold = 20
charging_symbol = '¾▒èñ'
discharging_symbol = '¾▒èí'
style = 'fg:#9966dd bg:#120840'

[[battery.display]]
threshold = 10
charging_symbol = '¾░¿£'
discharging_symbol = '¾┤âì'
style = 'bg:#c0392b'

[custom.giticon]
disabled = false
description = "Display symbol for remote Git server"
command = "check-git-remote.sh"
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
shell = ["bash", "--noprofile", "--norc"]
style = 'bg:#0c2e68'
format = '[ $output ](fg:#88bbff bg:#0c2e68)'

[custom.cpp]
description = "custom C++ config"
command = 'echo '
detect_extensions = ['.h', '.hpp', 'cpp', '.cc']
style = 'fg:#cc88ff bg:#1c0858'
format = '[ $output ]($style)'
when = true

[custom.vpn]
disabled = false
command = 'echo  ¾░ôä'
style = 'fg:#cc88ff bg:#1c0858'
format = '[ $output ]($style)'
when = 'ip route show | grep zcctun | awk "{ print $1 }" | grep "^53\." || daimler-vpn -s | grep -w "Connection Established"'

[custom.tmux_zoom]
disabled = false
description = "Show indicator when tmux pane is zoomed"
command = 'echo "¾░ûù zoom"'
style = 'fg:#cc88ff bg:#1c0858'
when = '[ -n "$TMUX" ] && [ "$(tmux display-message -p "#{window_zoomed_flag}")" = "1" ]'
format = '[ $output ]($style)'
shell = ["bash", "--noprofile", "--norc"]
