# ~/.config/starship.toml ÔÇö clean ┬À Inferno palette
# Fire spectrum: yellow-ember ÔåÆ orange ÔåÆ red ÔåÆ crimson
# Swap: cp starship-clean-gradient-inferno.toml starship.toml

add_newline = true
command_timeout = 1000

format = """
[ÔûæÔûÆÔûô](#e08020)\
[ $os ](bg:#e08020 fg:#0a0a0a)\
[¯é░](bg:#302008 fg:#e08020)\
$username\
$hostname\
$directory\
[¯é░](fg:#302008 bg:#280808)\
${custom.giticon}\
$git_branch\
$git_status\
[¯é░](fg:#280808 bg:#200808)\
${custom.tmux_zoom}\
$python\
$nodejs\
$rust\
$java\
$c\
${custom.cpp}\
${custom.vpn}\
$docker_context\
[¯é░](fg:#200808 bg:#180808)\
$cmd_duration\
$battery\
$time\
[¯é░](fg:#180808)\
\n$character"""

continuation_prompt = '[ÔûÂÔûÂ](#e05050) '

[fill]
symbol = 'ÔöÇ'
style = '#180808'

[character]
success_symbol = '[ÔØ»](bold #ffc830)'
error_symbol = '[ÔØ»](bold #ff4444)'

[os]
style = 'bg:#e08020'
format = '$symbol'
disabled = false

[os.symbols]
Macos = '¾░ÇÁ'
Ubuntu = "¯»ë"
Linux = "¯»å"

[username]
style_user = 'fg:#ffc830'
style_root = 'bold fg:#ff4444'
format = '[[ $user ](fg:#ffc830 bg:#302008)]($style)'
disabled = false
show_always = false

[hostname]
ssh_only = true
style = 'bg:#302008'
format = '[[@$hostname ](fg:#ffc830 bg:#302008)]($style)'
disabled = false

[directory]
style = 'bg:#302008'
format = '[[ $path ](fg:#ffc830 bg:#302008)]($style)'
truncation_length = 4
truncation_symbol = 'ÔÇª/'
fish_style_pwd_dir_length = 2
home_symbol = '¾░ï£ ~'
read_only = ' ¾░î¥'
read_only_style = 'fg:#ffc830 bg:#302008'

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = " "
style = 'bg:#280808'
format = '[[ $symbol$branch ](fg:#f05030 bg:#280808)]($style)'
truncation_symbol = 'ÔÇª/'

[git_status]
style = 'bg:#280808'
format = '[[($all_status$ahead_behind )](fg:#f05030 bg:#280808)]($style)'
up_to_date = ''
ahead = 'Ôçí${count}'
diverged = 'ÔçòÔçí${ahead_count}Ôçú${behind_count}'
behind = 'Ôçú${count}'
staged = '+${count} '
modified = '~${count} '
untracked = '?${count} '
deleted = '-${count} '
conflicted = '!${count} '
stashed = '\$${count} '

[python]
symbol = " "
style = 'bg:#200808'
format = '[[ $symbol($version )(\($virtualenv\) )](fg:#d03828 bg:#200808)]($style)'
pyenv_version_name = true

[nodejs]
symbol = " "
style = 'bg:#200808'
format = '[[ $symbol ($version) ](fg:#d03828 bg:#200808)]($style)'

[rust]
symbol = " "
style = 'bg:#200808'
format = '[[ $symbol ($version) ](fg:#d03828 bg:#200808)]($style)'

[java]
symbol = " "
style = 'bg:#200808'
format = '[[ $symbol ($version) ](fg:#d03828 bg:#200808)]($style)'

[c]
symbol = " "
style = 'bg:#200808'
format = '[[ $symbol ($version) ](fg:#d03828 bg:#200808)]($style)'
detect_extensions = ['.c']

[docker_context]
symbol = " "
style = 'bg:#200808'
format = '[[ $symbol $context ](fg:#d03828 bg:#200808)]($style)'

[cmd_duration]
min_time = 2000
style = 'bg:#180808'
format = '[[ ÔÅ▒ $duration ](fg:#a83828 bg:#180808)]($style)'

[time]
disabled = false
time_format = "%d/%m/%y %H:%M"
style = 'bg:#180808'
format = '[[  $time ](fg:#a83828 bg:#180808)]($style)'

[battery]
disabled = false
full_symbol = '¾▒èú'
charging_symbol = '¾▒èª'
discharging_symbol = '¾▒èú'
format = '[[ $symbol$percentage ](fg:#a83828 bg:#180808)]($style)'

[[battery.display]]
threshold = 100
style = 'bg:#180808'

[[battery.display]]
threshold = 50
charging_symbol = '¾▒èÑ'
discharging_symbol = '¾▒èó'
style = 'bg:#180808'

[[battery.display]]
threshold = 20
charging_symbol = '¾▒èñ'
discharging_symbol = '¾▒èí'
style = 'bg:#180808'

[[battery.display]]
threshold = 10
charging_symbol = '¾░¿£'
discharging_symbol = '¾┤âì'
style = 'bg:#c0392b'

[custom.giticon]
disabled = false
description = "Display symbol for remote Git server"
command = "check-git-remote.sh"
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
shell = ["bash", "--noprofile", "--norc"]
style = 'bg:#280808'
format = '[[ $output ](fg:#f05030 bg:#280808)]($style)'

[custom.cpp]
description = "custom C++ config"
command = 'echo '
detect_extensions = ['.h', '.hpp', 'cpp', '.cc']
style = 'bg:#200808'
format = '[[ $output ](fg:#d03828 bg:#200808)]($style)'
when = true

[custom.vpn]
disabled = false
command = 'echo  ¾░ôä'
style = 'bg:#200808'
format = '[[ $output ](fg:#d03828 bg:#200808)]($style)'
when = 'ip route show | grep zcctun | awk "{ print $1 }" | grep "^53\." || daimler-vpn -s | grep -w "Connection Established"'

[custom.tmux_zoom]
disabled = false
description = "Show indicator when tmux pane is zoomed"
command = 'echo "¾░ûù zoom"'
style = 'bg:#200808'
when = '[ -n "$TMUX" ] && [ "$(tmux display-message -p "#{window_zoomed_flag}")" = "1" ]'
format = '[[ $output ](fg:#d03828 bg:#200808)]($style)'
shell = ["bash", "--noprofile", "--norc"]
