# ~/.config/starship.toml вҖ” clean В· Aurora gradient  (Tokyo Night style)
# deep crimson вҶ’ dark violet вҶ’ royal blue вҶ’ deep cobalt
# Swap: cp starship-clean-gradient-aurora.toml starship.toml

add_newline = true
command_timeout = 1000

format = """
[в–‘в–’в–“](#e05050)\
[ $os ](bg:#e05050 fg:#0a0a0a)\
[оӮ°](bg:#3a1515 fg:#e05050)\
$username\
$hostname\
$directory\
[оӮ°](fg:#3a1515 bg:#7a1a4a)\
${custom.giticon}\
$git_branch\
$git_status\
[оӮ°](fg:#7a1a4a bg:#5a2a1a)\
${custom.tmux_zoom}\
$python\
$nodejs\
$rust\
$java\
$c\
${custom.cpp}\
${custom.vpn}\
$docker_context\
[оӮ°](fg:#5a2a1a bg:#051e3a)\
$cmd_duration\
$battery\
$time\
[оӮ°](fg:#051e3a)\
\n$character"""

continuation_prompt = '[в–¶в–¶](#e05050) '

[fill]
symbol = 'в”Җ'
style = '#1a0a3a'

[character]
success_symbol = '[вқҜ](bold #ff8080)'
error_symbol = '[вқҜ](bold #ff4444)'

[os]
style = 'bg:#e05050'
format = '$symbol'
disabled = false

[os.symbols]
Macos = 'у°Җө'
Ubuntu = ""
Linux = ""

[username]
style_user = 'fg:#ff60c0'
style_root = 'bold fg:#ff4444'
format = '[[ $user ](fg:#ff60c0 bg:#3a1515)]($style)'
disabled = false
show_always = false

[hostname]
ssh_only = true
style = 'bg:#3a1515'
format = '[[@$hostname ](fg:#ff60c0 bg:#3a1515)]($style)'
disabled = false

[directory]
style = 'bg:#3a1515'
format = '[[ $path ](fg:#ff60c0 bg:#3a1515)]($style)'
truncation_length = 4
truncation_symbol = 'вҖҰ/'
fish_style_pwd_dir_length = 2
home_symbol = 'у°Ӣң ~'
read_only = ' у°Ңҫ'
read_only_style = 'fg:#ff60c0 bg:#3a1515'

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = " "
style = 'bg:#7a1a4a'
format = '[[ $symbol$branch ](fg:#ff9040 bg:#7a1a4a)]($style)'
truncation_symbol = 'вҖҰ/'

[git_status]
style = 'bg:#7a1a4a'
format = '[[($all_status$ahead_behind )](fg:#ff9040 bg:#7a1a4a)]($style)'
up_to_date = ''
ahead = 'вҮЎ${count}'
diverged = 'вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}'
behind = 'вҮЈ${count}'
staged = '+${count} '
modified = '~${count} '
untracked = '?${count} '
deleted = '-${count} '
conflicted = '!${count} '
stashed = '\$${count} '

[python]
symbol = " "
style = 'bg:#5a2a1a'
format = '[[ $symbol($version )(\($virtualenv\) )](fg:#ff8040 bg:#5a2a1a)]($style)'
pyenv_version_name = true

[nodejs]
symbol = " "
style = 'bg:#5a2a1a'
format = '[[ $symbol ($version) ](fg:#ff8040 bg:#5a2a1a)]($style)'

[rust]
symbol = " "
style = 'bg:#5a2a1a'
format = '[[ $symbol ($version) ](fg:#ff8040 bg:#5a2a1a)]($style)'

[java]
symbol = " "
style = 'bg:#5a2a1a'
format = '[[ $symbol ($version) ](fg:#ff8040 bg:#5a2a1a)]($style)'

[c]
symbol = " "
style = 'bg:#5a2a1a'
format = '[[ $symbol ($version) ](fg:#ff8040 bg:#5a2a1a)]($style)'
detect_extensions = ['.c']

[docker_context]
symbol = " "
style = 'bg:#5a2a1a'
format = '[[ $symbol $context ](fg:#ff8040 bg:#5a2a1a)]($style)'

[cmd_duration]
min_time = 2000
style = 'bg:#051e3a'
format = '[[ вҸұ $duration ](fg:#ffb080 bg:#051e3a)]($style)'

[time]
disabled = false
time_format = "%d/%m/%y %H:%M"
style = 'bg:#051e3a'
format = '[[  $time ](fg:#ffb080 bg:#051e3a)]($style)'

[battery]
disabled = false
full_symbol = 'уұҠЈ'
charging_symbol = 'уұҠҰ'
discharging_symbol = 'уұҠЈ'
format = '[[ $symbol$percentage ](fg:#ffb080 bg:#051e3a)]($style)'

[[battery.display]]
threshold = 100
style = 'bg:#051e3a'

[[battery.display]]
threshold = 50
charging_symbol = 'уұҠҘ'
discharging_symbol = 'уұҠў'
style = 'bg:#051e3a'

[[battery.display]]
threshold = 20
charging_symbol = 'уұҠӨ'
discharging_symbol = 'уұҠЎ'
style = 'bg:#051e3a'

[[battery.display]]
threshold = 10
charging_symbol = 'у°Ёң'
discharging_symbol = 'уҙғҚ'
style = 'bg:#c0392b'

[custom.giticon]
disabled = false
description = "Display symbol for remote Git server"
command = "check-git-remote.sh"
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
shell = ["bash", "--noprofile", "--norc"]
style = 'bg:#7a1a4a'
format = '[[ $output ](fg:#ff9040 bg:#7a1a4a)]($style)'

[custom.cpp]
description = "custom C++ config"
command = 'echo '
detect_extensions = ['.h', '.hpp', 'cpp', '.cc']
style = 'bg:#5a2a1a'
format = '[[ $output ](fg:#ff8040 bg:#5a2a1a)]($style)'
when = true

[custom.vpn]
disabled = false
command = 'echo  у°“„'
style = 'bg:#5a2a1a'
format = '[[ $output ](fg:#ff8040 bg:#5a2a1a)]($style)'
when = 'ip route show | grep zcctun | awk "{ print $1 }" | grep "^53\." || daimler-vpn -s | grep -w "Connection Established"'

[custom.tmux_zoom]
disabled = false
description = "Show indicator when tmux pane is zoomed"
command = 'echo "у°–— zoom"'
style = 'bg:#5a2a1a'
when = '[ -n "$TMUX" ] && [ "$(tmux display-message -p "#{window_zoomed_flag}")" = "1" ]'
format = '[[ $output ](fg:#ff8040 bg:#5a2a1a)]($style)'
shell = ["bash", "--noprofile", "--norc"]
