# ~/.config/starship.toml ‚ÄĒ powerline ¬∑ Aurora gradient
# deep crimson ‚Üí dark violet ‚Üí royal blue ‚Üí cobalt
# Swap: cp starship-powerline-gradient-aurora.toml starship.toml

add_newline = true
command_timeout = 1000

format = """
[Óā∂](#6e0a4a)\
$os\
$username\
$hostname\
[Óāį](bg:#4a0a7e fg:#6e0a4a)\
$directory\
[Óāį](fg:#4a0a7e bg:#0a1a8e)\
${custom.giticon}\
$git_branch\
$git_status\
[Óāį](fg:#0a1a8e bg:#0a3a6e)\
${custom.tmux_zoom}\
$python\
$nodejs\
$rust\
$java\
$c\
${custom.cpp}\
${custom.vpn}\
$docker_context\
[Óāį](fg:#0a3a6e)\
$fill\
[Óāį](fg:#060e3a)\
$cmd_duration\
$battery\
$time\
[Óāį](fg:#060e3a)\
\n$character"""

continuation_prompt = '[‚Ė∂‚Ė∂](#e05050) '

[fill]
symbol = '‚ĒÄ'
style = '#1a0a3a'

[character]
success_symbol = '[‚ĚĮ](bold #ff8080)'
error_symbol = '[‚ĚĮ](bold #ff4444)'

[os]
style = 'bg:#6e0a4a'
format = '[ $symbol ]($style)'
disabled = false

[os.symbols]
Macos = 'ůįÄĶ'
Ubuntu = ""
Linux = ""

[username]
style_user = 'bg:#6e0a4a'
style_root = 'bg:#6e0a4a'
format = '[$user ]($style)'
disabled = false
show_always = false

[hostname]
ssh_only = true
style = 'bg:#6e0a4a'
format = '[@$hostname ]($style)'
disabled = false

[directory]
style = 'bg:#4a0a7e'
format = '[ $path ]($style)'
truncation_length = 4
truncation_symbol = '‚Ä¶/'
fish_style_pwd_dir_length = 2
home_symbol = 'ůįčú ~'
read_only = ' ůįĆĺ '
read_only_style = 'bg:#4a0a7e'

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = " "
style = 'bg:#0a1a8e'
format = '[ $symbol$branch ](fg:#e0a0ff bg:#0a1a8e)'
truncation_symbol = '‚Ä¶/'

[git_status]
style = 'bg:#0a1a8e'
format = '[$all_status$ahead_behind ](fg:#e0a0ff bg:#0a1a8e)'
up_to_date = ''
ahead = '‚á°${count}'
diverged = '‚áē‚á°${ahead_count}‚á£${behind_count}'
behind = '‚á£${count}'
staged = '+${count} '
modified = '~${count} '
untracked = '?${count} '
deleted = '-${count} '
conflicted = '!${count} '
stashed = '\$${count} '

[python]
symbol = " "
style = 'bg:#0a3a6e'
format = '[ $symbol($version )(\($virtualenv\) )]($style)'
pyenv_version_name = true

[nodejs]
symbol = " "
style = 'bg:#0a3a6e'
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = " "
style = 'bg:#0a3a6e'
format = '[ $symbol ($version) ]($style)'

[java]
symbol = " "
style = 'bg:#0a3a6e'
format = '[ $symbol ($version) ]($style)'

[c]
symbol = " "
style = 'bg:#0a3a6e'
format = '[ $symbol ($version) ]($style)'
detect_extensions = ['.c']

[docker_context]
symbol = " "
style = 'bg:#0a3a6e'
format = '[ $symbol $context ]($style)'

[cmd_duration]
min_time = 2000
style = 'bg:#060e3a'
format = '[ ‚ŹĪ $duration ]($style)'

[time]
disabled = false
time_format = "%d/%m/%y %H:%M"
style = 'bg:#060e3a'
format = '[ ůĪĎć $time ]($style)'

[battery]
disabled = false
full_symbol = 'ůĪä£'
charging_symbol = 'ůĪä¶'
discharging_symbol = 'ůĪä£'
format = '[ $symbol$percentage ]($style)'

[[battery.display]]
threshold = 100
style = 'bg:#060e3a'

[[battery.display]]
threshold = 50
charging_symbol = 'ůĪä•'
discharging_symbol = 'ůĪäĘ'
style = 'bg:#060e3a'

[[battery.display]]
threshold = 20
charging_symbol = 'ůĪä§'
discharging_symbol = 'ůĪä°'
style = 'bg:#060e3a'

[[battery.display]]
threshold = 10
charging_symbol = 'ůį®ú'
discharging_symbol = 'ůīÉć'
style = 'bg:#c0392b'

[custom.giticon]
disabled = false
description = "Display symbol for remote Git server"
command = "check-git-remote.sh"
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
shell = ["bash", "--noprofile", "--norc"]
style = 'bg:#0a1a8e'
format = '[ $output ](fg:#e0a0ff bg:#0a1a8e)'

[custom.cpp]
description = "custom C++ config"
command = 'echo '
detect_extensions = ['.h', '.hpp', 'cpp', '.cc']
style = 'bg:#0a3a6e'
format = '[ $output ]($style)'
when = true

[custom.vpn]
disabled = false
command = 'echo  ůįďĄ'
style = 'bg:#0a3a6e'
format = '[ $output ]($style)'
when = 'ip route show | grep zcctun | awk "{ print $1 }" | grep "^53\." || daimler-vpn -s | grep -w "Connection Established"'

[custom.tmux_zoom]
disabled = false
description = "Show indicator when tmux pane is zoomed"
command = 'echo "ůįĖó zoom"'
style = 'bg:#0a3a6e'
when = '[ -n "$TMUX" ] && [ "$(tmux display-message -p "#{window_zoomed_flag}")" = "1" ]'
format = '[ $output ]($style)'
shell = ["bash", "--noprofile", "--norc"]
