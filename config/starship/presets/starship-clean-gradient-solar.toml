# ~/.config/starship.toml — clean · Solar palette
# Sun-drenched: yellow → gold → amber → copper
# Swap: cp starship-clean-gradient-solar.toml starship.toml

add_newline = true
command_timeout = 1000

format = """
[░▒▓](#d0a020)\
[ $os ](bg:#d0a020 fg:#0a0a0a)\
[](bg:#282010 fg:#d0a020)\
$username\
$hostname\
$directory\
[](fg:#282010 bg:#181408)\
${custom.giticon}\
$git_branch\
$git_status\
[](fg:#181408 bg:#141008)\
${custom.tmux_zoom}\
$python\
$nodejs\
$rust\
$java\
$c\
${custom.cpp}\
${custom.vpn}\
$docker_context\
[](fg:#141008 bg:#100c08)\
$cmd_duration\
$battery\
$time\
[](fg:#100c08)\
\n$character"""

continuation_prompt = '[▶▶](#d09020) '

[fill]
symbol = '─'
style = '#100c08'

[character]
success_symbol = '[❯](bold #ffd040)'
error_symbol = '[❯](bold #ff4444)'

[os]
style = 'bg:#d0a020'
format = '$symbol'
disabled = false

[os.symbols]
Macos = '󰀵'
Ubuntu = ""
Linux = ""

[username]
style_user = 'fg:#ffd040'
style_root = 'bold fg:#ff4444'
format = '[[ $user ](fg:#ffd040 bg:#282010)]($style)'
disabled = false
show_always = false

[hostname]
ssh_only = true
style = 'bg:#282010'
format = '[[@$hostname ](fg:#ffd040 bg:#282010)]($style)'
disabled = false

[directory]
style = 'bg:#282010'
format = '[[ $path ](fg:#ffd040 bg:#282010)]($style)'
truncation_length = 4
truncation_symbol = '…/'
fish_style_pwd_dir_length = 2
home_symbol = '󰋜 ~'
read_only = ' 󰌾'
read_only_style = 'fg:#ffd040 bg:#282010'

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = " "
style = 'bg:#181408'
format = '[[ $symbol$branch ](fg:#d88820 bg:#181408)]($style)'
truncation_symbol = '…/'

[git_status]
style = 'bg:#181408'
format = '[[($all_status$ahead_behind )](fg:#d88820 bg:#181408)]($style)'
up_to_date = ''
ahead = '⇡${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
behind = '⇣${count}'
staged = '+${count} '
modified = '~${count} '
untracked = '?${count} '
deleted = '-${count} '
conflicted = '!${count} '
stashed = '\$${count} '

[python]
symbol = " "
style = 'bg:#141008'
format = '[[ $symbol($version )(\($virtualenv\) )](fg:#b87020 bg:#141008)]($style)'
pyenv_version_name = true

[nodejs]
symbol = " "
style = 'bg:#141008'
format = '[[ $symbol ($version) ](fg:#b87020 bg:#141008)]($style)'

[rust]
symbol = " "
style = 'bg:#141008'
format = '[[ $symbol ($version) ](fg:#b87020 bg:#141008)]($style)'

[java]
symbol = " "
style = 'bg:#141008'
format = '[[ $symbol ($version) ](fg:#b87020 bg:#141008)]($style)'

[c]
symbol = " "
style = 'bg:#141008'
format = '[[ $symbol ($version) ](fg:#b87020 bg:#141008)]($style)'
detect_extensions = ['.c']

[docker_context]
symbol = " "
style = 'bg:#141008'
format = '[[ $symbol $context ](fg:#b87020 bg:#141008)]($style)'

[cmd_duration]
min_time = 2000
style = 'bg:#100c08'
format = '[[ ⏱ $duration ](fg:#986020 bg:#100c08)]($style)'

[time]
disabled = false
time_format = "%d/%m/%y %H:%M"
style = 'bg:#100c08'
format = '[[  $time ](fg:#986020 bg:#100c08)]($style)'

[battery]
disabled = false
full_symbol = '󱊣'
charging_symbol = '󱊦'
discharging_symbol = '󱊣'
format = '[[ $symbol$percentage ](fg:#986020 bg:#100c08)]($style)'

[[battery.display]]
threshold = 100
style = 'bg:#100c08'

[[battery.display]]
threshold = 50
charging_symbol = '󱊥'
discharging_symbol = '󱊢'
style = 'bg:#100c08'

[[battery.display]]
threshold = 20
charging_symbol = '󱊤'
discharging_symbol = '󱊡'
style = 'bg:#100c08'

[[battery.display]]
threshold = 10
charging_symbol = '󰨜'
discharging_symbol = '󴃍'
style = 'bg:#c0392b'

[custom.giticon]
disabled = false
description = "Display symbol for remote Git server"
command = "check-git-remote.sh"
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
shell = ["bash", "--noprofile", "--norc"]
style = 'bg:#181408'
format = '[[ $output ](fg:#d88820 bg:#181408)]($style)'

[custom.cpp]
description = "custom C++ config"
command = 'echo '
detect_extensions = ['.h', '.hpp', 'cpp', '.cc']
style = 'bg:#141008'
format = '[[ $output ](fg:#b87020 bg:#141008)]($style)'
when = true

[custom.vpn]
disabled = false
command = 'echo  󰓄'
style = 'bg:#141008'
format = '[[ $output ](fg:#b87020 bg:#141008)]($style)'
when = 'ip route show | grep zcctun | awk "{ print $1 }" | grep "^53\." || daimler-vpn -s | grep -w "Connection Established"'

[custom.tmux_zoom]
disabled = false
description = "Show indicator when tmux pane is zoomed"
command = 'echo "󰖗 zoom"'
style = 'bg:#141008'
when = '[ -n "$TMUX" ] && [ "$(tmux display-message -p "#{window_zoomed_flag}")" = "1" ]'
format = '[[ $output ](fg:#b87020 bg:#141008)]($style)'
shell = ["bash", "--noprofile", "--norc"]
