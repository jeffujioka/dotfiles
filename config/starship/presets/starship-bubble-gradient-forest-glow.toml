# ~/.config/starship.toml вҖ” bubble В· Forest palette  В· glow В· medium contrast
# Woodland: canopy вҶ’ moss вҶ’ earth
# Swap: starship-picker

add_newline = true
command_timeout = 1000

format = """
[оӮ¶](fg:#40c050)[ $os ](fg:#0a0a0a bg:#40c050)[оӮҙ](fg:#40c050) \
[оӮ¶](fg:#143818)$username\
$hostname\
$directory\
[оӮҙ](fg:#143818) \
${custom.git_start}\
${custom.giticon}\
$git_branch\
$git_status\
${custom.git_end}\
${custom.tmux_zoom}\
$python\
$nodejs\
$rust\
$java\
$c\
${custom.cpp}\
${custom.vpn}\
$docker_context\
$fill\
[оӮ¶](fg:#1a1808)$cmd_duration\
$battery\
$time\
[оӮҙ](fg:#0c081e)\
\n$character"""

continuation_prompt = '[оӮ°оӮ°](#10c050) '

[fill]
symbol = 'в”Җ'
style = '#1a1808'

[character]
success_symbol = '[вқҜ](bold #50c868)'
error_symbol = '[вқҜ](bold #ff4444)'

[os]
style = 'bg:#40c050'
format = '$symbol'
disabled = false

[os.symbols]
Macos = 'у°Җө'
Ubuntu = "оҜү"
Linux = "оҜҶ"

[username]
style_user = 'fg:#99ff88'
style_root = 'bold fg:#ff4444'
format = '[[ $user ](fg:#99ff88 bg:#143818)]($style)'
disabled = false
show_always = false

[hostname]
ssh_only = true
style = 'bg:#143818'
format = '[[@$hostname ](fg:#99ff88 bg:#143818)]($style)'
disabled = false

[directory]
style = 'bg:#143818'
format = '[[ $path ](fg:#99ff88 bg:#143818)]($style)'
truncation_length = 4
truncation_symbol = 'вҖҰ/'
fish_style_pwd_dir_length = 2
home_symbol = 'у°Ӣң ~'
read_only = ' у°Ңҫ'
read_only_style = 'fg:#99ff88 bg:#143818'

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = " "
style = 'bg:#142810'
format = '[[ $symbol$branch ](fg:#99ee44 bg:#142810)]($style)'
truncation_symbol = 'вҖҰ/'

[git_status]
style = 'bg:#142810'
format = '[[($all_status$ahead_behind )](fg:#99ee44 bg:#142810)]($style)'
up_to_date = ''
ahead = 'вҮЎ${count}'
diverged = 'вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}'
behind = 'вҮЈ${count}'
staged = '+${count} '
modified = '~${count} '
untracked = '?${count} '
deleted = '-${count} '
conflicted = '!${count} '
stashed = '\$${count} '

[python]
symbol = " "
style = 'bg:#222008'
format = '[оӮ¶](fg:#222008)[ $symbol($version )(\($virtualenv\) ) ](fg:#ddcc33 bg:#222008)[оӮҙ](fg:#222008) '
pyenv_version_name = true

[nodejs]
symbol = " "
style = 'bg:#222008'
format = '[оӮ¶](fg:#222008)[ $symbol ($version) ](fg:#ddcc33 bg:#222008)[оӮҙ](fg:#222008) '

[rust]
symbol = " "
style = 'bg:#222008'
format = '[оӮ¶](fg:#222008)[ $symbol ($version) ](fg:#ddcc33 bg:#222008)[оӮҙ](fg:#222008) '

[java]
symbol = " "
style = 'bg:#222008'
format = '[оӮ¶](fg:#222008)[ $symbol ($version) ](fg:#ddcc33 bg:#222008)[оӮҙ](fg:#222008) '

[c]
symbol = " "
style = 'bg:#222008'
format = '[оӮ¶](fg:#222008)[ $symbol ($version) ](fg:#ddcc33 bg:#222008)[оӮҙ](fg:#222008) '
detect_extensions = ['.c']

[docker_context]
symbol = " "
style = 'bg:#222008'
format = '[оӮ¶](fg:#222008)[ $symbol $context ](fg:#ddcc33 bg:#222008)[оӮҙ](fg:#222008) '

[cmd_duration]
min_time = 2000
style = 'bg:#1a1808'
format = '[[ вҸұ $duration ](fg:#bbaa22 bg:#1a1808)]($style)'

[time]
disabled = false
time_format = "%d/%m/%y %H:%M"
style = 'bg:#1a1808'
format = '[[  $time ](fg:#bbaa22 bg:#1a1808)]($style)'

[battery]
disabled = false
full_symbol = 'уұҠЈ'
charging_symbol = 'уұҠҰ'
discharging_symbol = 'уұҠЈ'
format = '[[ $symbol$percentage ](fg:#bbaa22 bg:#1a1808)]($style)'

[[battery.display]]
threshold = 100
style = 'bg:#1a1808'

[[battery.display]]
threshold = 50
charging_symbol = 'уұҠҘ'
discharging_symbol = 'уұҠў'
style = 'bg:#1a1808'

[[battery.display]]
threshold = 20
charging_symbol = 'уұҠӨ'
discharging_symbol = 'уұҠЎ'
style = 'bg:#1a1808'

[[battery.display]]
threshold = 10
charging_symbol = 'у°Ёң'
discharging_symbol = 'уҙғҚ'
style = 'bg:#c0392b'

[custom.git_start]
disabled = false
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
command = 'echo ""'
shell = ["bash", "--noprofile", "--norc"]
format = '[оӮ¶](fg:#142810)'

[custom.git_end]
disabled = false
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
command = 'echo ""'
shell = ["bash", "--noprofile", "--norc"]
format = '[оӮҙ](fg:#142810) '

[custom.giticon]
disabled = false
description = "Display symbol for remote Git server"
command = "check-git-remote.sh"
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
shell = ["bash", "--noprofile", "--norc"]
style = 'bg:#142810'
format = '[[ $output ](fg:#99ee44 bg:#142810)]($style)'

[custom.cpp]
description = "custom C++ config"
command = 'echo '
detect_extensions = ['.h', '.hpp', 'cpp', '.cc']
style = 'bg:#222008'
format = '[оӮ¶](fg:#222008)[ $output ](fg:#ddcc33 bg:#222008)[оӮҙ](fg:#222008) '
when = true

[custom.vpn]
disabled = false
command = 'echo  у°“„'
style = 'bg:#222008'
format = '[оӮ¶](fg:#222008)[ $output ](fg:#ddcc33 bg:#222008)[оӮҙ](fg:#222008) '
when = 'ip route show | grep zcctun | awk "{ print $1 }" | grep "^53\." || daimler-vpn -s | grep -w "Connection Established"'

[custom.tmux_zoom]
disabled = false
description = "Show indicator when tmux pane is zoomed"
command = 'echo "у°–— zoom"'
style = 'bg:#222008'
when = '[ -n "$TMUX" ] && [ "$(tmux display-message -p "#{window_zoomed_flag}")" = "1" ]'
format = '[оӮ¶](fg:#222008)[ $output ](fg:#ddcc33 bg:#222008)[оӮҙ](fg:#222008) '
shell = ["bash", "--noprofile", "--norc"]
