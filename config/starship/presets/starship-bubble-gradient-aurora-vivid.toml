# ~/.config/starship.toml вҖ” bubble В· Aurora palette  В· vivid В· high contrast
# Northern lights: green вҶ’ teal вҶ’ blue вҶ’ violet
# Swap: starship-picker

add_newline = true
command_timeout = 1000

format = """
[оӮ¶](fg:#00d870)[ $os ](fg:#0a0a0a bg:#00d870)[оӮҙ](fg:#00d870) \
[оӮ¶](fg:#007030)$username\
$hostname\
$directory\
[оӮҙ](fg:#007030) \
${custom.git_start}\
${custom.giticon}\
$git_branch\
$git_status\
${custom.git_end}\
${custom.tmux_zoom}\
$python\
$nodejs\
$rust\
$java\
$c\
${custom.cpp}\
${custom.vpn}\
$docker_context\
$fill\
[оӮ¶](fg:#1e0c58)$cmd_duration\
$battery\
$time\
[оӮҙ](fg:#0c081e)\
\n$character"""

continuation_prompt = '[оӮ°оӮ°](#00c860) '

[fill]
symbol = 'в”Җ'
style = '#1e0c58'

[character]
success_symbol = '[вқҜ](bold #00e888)'
error_symbol = '[вқҜ](bold #ff4444)'

[os]
style = 'bg:#00d870'
format = '$symbol'
disabled = false

[os.symbols]
Macos = 'у°Җө'
Ubuntu = "оҜү"
Linux = "оҜҶ"

[username]
style_user = 'fg:#66ffbb'
style_root = 'bold fg:#ff4444'
format = '[[ $user ](fg:#66ffbb bg:#007030)]($style)'
disabled = false
show_always = false

[hostname]
ssh_only = true
style = 'bg:#007030'
format = '[[@$hostname ](fg:#66ffbb bg:#007030)]($style)'
disabled = false

[directory]
style = 'bg:#007030'
format = '[[ $path ](fg:#66ffbb bg:#007030)]($style)'
truncation_length = 4
truncation_symbol = 'вҖҰ/'
fish_style_pwd_dir_length = 2
home_symbol = 'у°Ӣң ~'
read_only = ' у°Ңҫ'
read_only_style = 'fg:#66ffbb bg:#007030'

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = " "
style = 'bg:#184888'
format = '[[ $symbol$branch ](fg:#aaddff bg:#184888)]($style)'
truncation_symbol = 'вҖҰ/'

[git_status]
style = 'bg:#184888'
format = '[[($all_status$ahead_behind )](fg:#aaddff bg:#184888)]($style)'
up_to_date = ''
ahead = 'вҮЎ${count}'
diverged = 'вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}'
behind = 'вҮЈ${count}'
staged = '+${count} '
modified = '~${count} '
untracked = '?${count} '
deleted = '-${count} '
conflicted = '!${count} '
stashed = '\$${count} '

[python]
symbol = " "
style = 'bg:#301480'
format = '[оӮ¶](fg:#301480)[ $symbol($version )(\($virtualenv\) ) ](fg:#ddaaff bg:#301480)[оӮҙ](fg:#301480) '
pyenv_version_name = true

[nodejs]
symbol = " "
style = 'bg:#301480'
format = '[оӮ¶](fg:#301480)[ $symbol ($version) ](fg:#ddaaff bg:#301480)[оӮҙ](fg:#301480) '

[rust]
symbol = " "
style = 'bg:#301480'
format = '[оӮ¶](fg:#301480)[ $symbol ($version) ](fg:#ddaaff bg:#301480)[оӮҙ](fg:#301480) '

[java]
symbol = " "
style = 'bg:#301480'
format = '[оӮ¶](fg:#301480)[ $symbol ($version) ](fg:#ddaaff bg:#301480)[оӮҙ](fg:#301480) '

[c]
symbol = " "
style = 'bg:#301480'
format = '[оӮ¶](fg:#301480)[ $symbol ($version) ](fg:#ddaaff bg:#301480)[оӮҙ](fg:#301480) '
detect_extensions = ['.c']

[docker_context]
symbol = " "
style = 'bg:#301480'
format = '[оӮ¶](fg:#301480)[ $symbol $context ](fg:#ddaaff bg:#301480)[оӮҙ](fg:#301480) '

[cmd_duration]
min_time = 2000
style = 'bg:#1e0c58'
format = '[[ вҸұ $duration ](fg:#bb88ff bg:#1e0c58)]($style)'

[time]
disabled = false
time_format = "%d/%m/%y %H:%M"
style = 'bg:#1e0c58'
format = '[[  $time ](fg:#bb88ff bg:#1e0c58)]($style)'

[battery]
disabled = false
full_symbol = 'уұҠЈ'
charging_symbol = 'уұҠҰ'
discharging_symbol = 'уұҠЈ'
format = '[[ $symbol$percentage ](fg:#bb88ff bg:#1e0c58)]($style)'

[[battery.display]]
threshold = 100
style = 'bg:#1e0c58'

[[battery.display]]
threshold = 50
charging_symbol = 'уұҠҘ'
discharging_symbol = 'уұҠў'
style = 'bg:#1e0c58'

[[battery.display]]
threshold = 20
charging_symbol = 'уұҠӨ'
discharging_symbol = 'уұҠЎ'
style = 'bg:#1e0c58'

[[battery.display]]
threshold = 10
charging_symbol = 'у°Ёң'
discharging_symbol = 'уҙғҚ'
style = 'bg:#c0392b'

[custom.git_start]
disabled = false
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
command = 'echo ""'
shell = ["bash", "--noprofile", "--norc"]
format = '[оӮ¶](fg:#184888)'

[custom.git_end]
disabled = false
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
command = 'echo ""'
shell = ["bash", "--noprofile", "--norc"]
format = '[оӮҙ](fg:#184888) '

[custom.giticon]
disabled = false
description = "Display symbol for remote Git server"
command = "check-git-remote.sh"
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
shell = ["bash", "--noprofile", "--norc"]
style = 'bg:#184888'
format = '[[ $output ](fg:#aaddff bg:#184888)]($style)'

[custom.cpp]
description = "custom C++ config"
command = 'echo '
detect_extensions = ['.h', '.hpp', 'cpp', '.cc']
style = 'bg:#301480'
format = '[оӮ¶](fg:#301480)[ $output ](fg:#ddaaff bg:#301480)[оӮҙ](fg:#301480) '
when = true

[custom.vpn]
disabled = false
command = 'echo  у°“„'
style = 'bg:#301480'
format = '[оӮ¶](fg:#301480)[ $output ](fg:#ddaaff bg:#301480)[оӮҙ](fg:#301480) '
when = 'ip route show | grep zcctun | awk "{ print $1 }" | grep "^53\." || daimler-vpn -s | grep -w "Connection Established"'

[custom.tmux_zoom]
disabled = false
description = "Show indicator when tmux pane is zoomed"
command = 'echo "у°–— zoom"'
style = 'bg:#301480'
when = '[ -n "$TMUX" ] && [ "$(tmux display-message -p "#{window_zoomed_flag}")" = "1" ]'
format = '[оӮ¶](fg:#301480)[ $output ](fg:#ddaaff bg:#301480)[оӮҙ](fg:#301480) '
shell = ["bash", "--noprofile", "--norc"]
