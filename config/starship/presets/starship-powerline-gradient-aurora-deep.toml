# ~/.config/starship.toml ‚Äî powerline ¬∑ Aurora palette  ¬∑ deep ¬∑ dark hue-shift
# Northern lights: green ‚Üí teal ‚Üí blue ‚Üí violet
# Swap: starship-picker

add_newline = true
command_timeout = 1000

format = """
[ÓÇ∂](#002a12)\
$os\
$username\
$hostname\
[ÓÇ∞](bg:#002a30 fg:#002a12)\
$directory\
[ÓÇ∞](fg:#002a30 bg:#061838)\
${custom.giticon}\
$git_branch\
$git_status\
[ÓÇ∞](fg:#061838 bg:#120630)\
${custom.tmux_zoom}\
$python\
$nodejs\
$rust\
$java\
$c\
${custom.cpp}\
${custom.vpn}\
$docker_context\
[ÓÇ∞](fg:#120630)\
$fill\
[ÓÇ≤](fg:#0c0620)\
$cmd_duration\
$battery\
$time\
[ÓÇ¥](fg:#0c0620)\
\n$character"""

continuation_prompt = '[ÓÇ∞ÓÇ∞](#00c860) '

[fill]
symbol = '‚îÄ'
style = '#060310'

[character]
success_symbol = '[‚ùØ](bold #00e888)'
error_symbol = '[‚ùØ](bold #ff4444)'

[os]
style = 'fg:#44ffaa bg:#002a12'
format = '[ $symbol ]($style)'
disabled = false

[os.symbols]
Macos = 'Û∞Äµ'
Ubuntu = "ÓØâ"
Linux = "ÓØÜ"

[username]
style_user = 'fg:#44ffaa bg:#002a12'
style_root = 'fg:#44ffaa bg:#002a12'
format = '[ $user]($style)'
disabled = false
show_always = false

[hostname]
ssh_only = true
style = 'fg:#44ffaa bg:#002a12'
format = '[@$hostname ]($style)'
disabled = false

[directory]
style = 'fg:#44d0cc bg:#002a30'
format = '[ $path ]($style)'
truncation_length = 4
truncation_symbol = '‚Ä¶/'
fish_style_pwd_dir_length = 2
home_symbol = 'Û∞ãú ~'
read_only = ' Û∞åæ '
read_only_style = 'fg:#44d0cc bg:#002a30'

[directory.substitutions]
"Documents" = "Û∞àô "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = " "
style = 'bg:#061838'
format = '[ $symbol$branch ](fg:#77aaff bg:#061838)'
truncation_symbol = '‚Ä¶/'

[git_status]
style = 'bg:#061838'
format = '[$all_status$ahead_behind ](fg:#77aaff bg:#061838)'
up_to_date = ''
ahead = '‚á°${count}'
diverged = '‚áï‚á°${ahead_count}‚á£${behind_count}'
behind = '‚á£${count}'
staged = '+${count} '
modified = '~${count} '
untracked = '?${count} '
deleted = '-${count} '
conflicted = '!${count} '
stashed = '\$${count} '

[python]
symbol = " "
style = 'fg:#bb77ff bg:#120630'
format = '[ $symbol($version )(\($virtualenv\) )]($style)'
pyenv_version_name = true

[nodejs]
symbol = " "
style = 'fg:#bb77ff bg:#120630'
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = " "
style = 'fg:#bb77ff bg:#120630'
format = '[ $symbol ($version) ]($style)'

[java]
symbol = " "
style = 'fg:#bb77ff bg:#120630'
format = '[ $symbol ($version) ]($style)'

[c]
symbol = " "
style = 'fg:#bb77ff bg:#120630'
format = '[ $symbol ($version) ]($style)'
detect_extensions = ['.c']

[docker_context]
symbol = " "
style = 'fg:#bb77ff bg:#120630'
format = '[ $symbol $context ]($style)'

[cmd_duration]
min_time = 2000
style = 'fg:#8855cc bg:#0c0620'
format = '[ ‚è± $duration ]($style)'

[time]
disabled = false
time_format = "%d/%m/%y %H:%M"
style = 'fg:#8855cc bg:#0c0620'
format = '[ Û±ëç $time ]($style)'

[battery]
disabled = false
full_symbol = 'Û±ä£'
charging_symbol = 'Û±ä¶'
discharging_symbol = 'Û±ä£'
format = '[ $symbol$percentage ]($style)'

[[battery.display]]
threshold = 100
style = 'fg:#8855cc bg:#0c0620'

[[battery.display]]
threshold = 50
charging_symbol = 'Û±ä•'
discharging_symbol = 'Û±ä¢'
style = 'fg:#8855cc bg:#0c0620'

[[battery.display]]
threshold = 20
charging_symbol = 'Û±ä§'
discharging_symbol = 'Û±ä°'
style = 'fg:#8855cc bg:#0c0620'

[[battery.display]]
threshold = 10
charging_symbol = 'Û∞®ú'
discharging_symbol = 'Û¥Éç'
style = 'bg:#c0392b'

[custom.giticon]
disabled = false
description = "Display symbol for remote Git server"
command = "check-git-remote.sh"
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
shell = ["bash", "--noprofile", "--norc"]
style = 'bg:#061838'
format = '[ $output ](fg:#77aaff bg:#061838)'

[custom.cpp]
description = "custom C++ config"
command = 'echo '
detect_extensions = ['.h', '.hpp', 'cpp', '.cc']
style = 'fg:#bb77ff bg:#120630'
format = '[ $output ]($style)'
when = true

[custom.vpn]
disabled = false
command = 'echo  Û∞ìÑ'
style = 'fg:#bb77ff bg:#120630'
format = '[ $output ]($style)'
when = 'ip route show | grep zcctun | awk "{ print $1 }" | grep "^53\." || daimler-vpn -s | grep -w "Connection Established"'

[custom.tmux_zoom]
disabled = false
description = "Show indicator when tmux pane is zoomed"
command = 'echo "Û∞ñó zoom"'
style = 'fg:#bb77ff bg:#120630'
when = '[ -n "$TMUX" ] && [ "$(tmux display-message -p "#{window_zoomed_flag}")" = "1" ]'
format = '[ $output ]($style)'
shell = ["bash", "--noprofile", "--norc"]
